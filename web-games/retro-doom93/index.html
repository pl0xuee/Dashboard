<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sector 93</title>
  <style>
    :root{--hud-bg:rgba(10,13,20,0.92);--hud-border:rgba(130,155,200,0.22);--text:#d8e8ff}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#04060b;color:var(--text);font-family:'Trebuchet MS',Verdana,sans-serif}
    #gc{position:relative;width:100%;height:100%;background:#04060b;border:1px solid rgba(90,115,165,0.2);overflow:hidden}
    canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block;image-rendering:pixelated}
    #overlay{position:absolute;inset:0;pointer-events:none}
    #xhair{position:absolute;left:50%;top:50%;width:18px;height:18px;transform:translate(-50%,-50%)}
    #xhair::before,#xhair::after{content:'';position:absolute;background:rgba(230,242,255,0.88);box-shadow:0 0 4px rgba(100,170,255,0.5)}
    #xhair::before{left:8px;top:1px;width:2px;height:16px}
    #xhair::after{left:1px;top:8px;width:16px;height:2px}
    #hud{position:absolute;left:0;right:0;bottom:0;height:86px;padding:8px 14px;
      background:linear-gradient(180deg,transparent,var(--hud-bg) 40%),
        repeating-linear-gradient(90deg,rgba(255,255,255,0.028) 0,rgba(255,255,255,0.028) 1px,transparent 1px,transparent 6px);
      border-top:1px solid var(--hud-border);
      display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:10px;pointer-events:none}
    .hb{display:flex;flex-direction:column;gap:3px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .hb strong{font-size:1.05rem;color:#eef5ff}
    .hb-c{text-align:center;min-width:170px}
    #statusText{font-size:.64rem;color:#9ab8e8;letter-spacing:.1em;text-transform:uppercase}
    .meter{height:6px;border-radius:99px;border:1px solid rgba(160,185,230,0.28);background:rgba(8,10,16,0.8);overflow:hidden;min-width:88px}
    .meter>span{display:block;height:100%;transition:width 110ms linear}
    #hpBar>span{background:linear-gradient(90deg,#ff7055,#ff4a42)}
    #amBar>span{background:linear-gradient(90deg,#8ec8ff,#5ea0ff)}
    .mr{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:7px;font-size:.64rem;margin-top:1px}
    #keyStatus{display:inline-block;font-size:.7rem;letter-spacing:.06em;padding:1px 6px;border-radius:4px;border:1px solid transparent}
    #keyStatus.have{background:rgba(240,210,80,0.18);border-color:rgba(240,210,80,0.5);color:#f0d250}
    #keyStatus.missing{background:rgba(80,80,80,0.18);border-color:rgba(80,80,80,0.35);color:#666}
    #weapon{position:absolute;left:50%;bottom:78px;width:min(42vw,310px);transform:translateX(-50%);
      transform-origin:center bottom;filter:drop-shadow(0 8px 18px rgba(0,0,0,0.6));pointer-events:none;image-rendering:pixelated}
    #sFlash{position:absolute;inset:0;background:rgba(255,245,200,0.68);opacity:0;transition:opacity 70ms linear;pointer-events:none}
    #hFlash{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,60,45,0) 40%,rgba(255,60,45,0.32) 100%);opacity:0;transition:opacity 80ms linear;pointer-events:none}
    #pkFlash{position:absolute;inset:0;opacity:0;transition:opacity 110ms linear;pointer-events:none}
    .sov{position:absolute;inset:0;display:grid;place-items:center;
      background:linear-gradient(180deg,rgba(4,6,12,.4),rgba(4,6,12,.88));
      text-align:center;padding:22px;pointer-events:auto;z-index:5;transition:opacity 140ms ease}
    .sov.hidden{opacity:0;pointer-events:none}
    .card{max-width:500px;border:1px solid rgba(180,205,248,0.26);border-radius:14px;padding:16px 20px;
      background:linear-gradient(180deg,rgba(22,30,46,0.92),rgba(8,12,22,0.96));box-shadow:0 14px 28px rgba(0,0,0,0.44)}
    .card h1,.card h2{font-size:clamp(1.1rem,2.3vw,1.55rem);color:#f0e0c0;letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px}
    .card p{font-size:.86rem;line-height:1.48;color:#c8d8f8}
    .card pre{font-size:.8rem;line-height:1.52;color:#c8d8f8;white-space:pre-line;font-family:inherit}
    .card button{margin-top:14px;border:1px solid rgba(175,200,248,0.38);border-radius:10px;padding:9px 18px;
      background:linear-gradient(180deg,rgba(75,100,145,0.65),rgba(36,52,82,0.85));
      color:#f0f5ff;font-family:inherit;font-size:.84rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
    #startPrompt{cursor:pointer}
    @media(max-width:700px){#hud{grid-template-columns:1fr 1fr}.hb-c{order:3;grid-column:1/-1}#weapon{width:min(54vw,260px);bottom:92px}}
  </style>
</head>

    for(let i=arr.length-1;i>0;i--) {

  function _nb(){

  function _o(vol){
    const g=AC.createGain(); g.gain.value=vol;
    g.connect(AC.destination); return g;
  }

  const sfx={

    pickup(type){

      f.forEach((freq,i)=>{
        const o=AC.createOscillator(); o.type='sine'; o.frequency.value=freq;
        const g=AC.createGain(); const d=i*0.07;
        g.gain.setValueAtTime(0,t+d); g.gain.linearRampToValueAtTime(0.38,t+d+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+d+0.28);
        o.connect(g); g.connect(mg); o.start(t+d); o.stop(t+d+0.28);
      });

        const g=AC.createGain(); const d=i*0.10;

    },
    gameOver(){
      if(!AC) return;
      const t=AC.currentTime, mg=_o(0.38);

        const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;

  function _startMusic(){
    if(!AC||_musicActive) return;
    _musicActive=true;
    _musicGain=AC.createGain(); _musicGain.gain.value=0.06; _musicGain.connect(AC.destination);
    [55,55.4].forEach(f=>{
      const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
      const filt=AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=160; filt.Q.value=2.5;
      const g=AC.createGain(); g.gain.value=0.35;
      o.connect(filt); filt.connect(g); g.connect(_musicGain); o.start();
    });
    _scheduleMelody(AC.currentTime+0.5);
  }

  function _scheduleMelody(start){
    if(!_musicActive||!AC) return;
    const scale=[55,65.4,73.4,82.4,98,110];
    const pat=[0,null,null,2,null,4,null,null,1,null,null,3,null,5,null,null];
    const bl=0.50;
    pat.forEach((n,i)=>{
      if(n===null) return;
      const t=start+i*bl;
      if(t<AC.currentTime+0.05) return;
      const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=scale[n]*4;
      const g=AC.createGain();
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.04); g.gain.exponentialRampToValueAtTime(0.001,t+bl*0.75);
      const filt=AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1400;
      o.connect(filt); filt.connect(g); g.connect(_musicGain);
      o.start(t); o.stop(t+bl);
    });
    const total=pat.length*bl;
    _melodyTimer=setTimeout(()=>_scheduleMelody(start+total),(start+total-AC.currentTime)*1000-80);
  }

  // ── Map helpers ──────────────────────────────────────────────────────────────
  function cellAt(cx,cz) {
    if (cx<0||cz<0||cx>=worldW||cz>=worldH) return 1;
    return currentMap[cz][cx];
  }
  function isSolid(v) { return v===1||v===7||v===8; }
  function isWallAt(x,z) { return isSolid(cellAt(Math.floor(x),Math.floor(z))); }
  function canMoveTo(x,z,r) {
    return !isWallAt(x-r,z-r)&&!isWallAt(x+r,z-r)&&!isWallAt(x-r,z+r)&&!isWallAt(x+r,z+r)
        && !isWallAt(x,z-r)  &&!isWallAt(x,z+r)   &&!isWallAt(x-r,z) &&!isWallAt(x+r,z);
  }
  function hasLOS(ax,az,bx,bz) {
    const dx=bx-ax, dz=bz-az, dist=Math.hypot(dx,dz);
    if (dist<0.001) return true;
    const steps=Math.max(2,Math.ceil(dist/0.14));
    for (let i=1;i<steps;i++) { const t=i/steps; if (isWallAt(ax+dx*t,az+dz*t)) return false; }
    return true;
  }
  function sealBorders(m) {
    if (!m.length) return;
    const lr=m.length-1, lc=m[0].length-1;
    for (let x=0;x<=lc;x++) { m[0][x]=1; m[lr][x]=1; }
    for (let z=0;z<=lr;z++) { m[z][0]=1; m[z][lc]=1; }
  }

  // ── Clear level ──────────────────────────────────────────────────────────────
  function clearLevel() {
    levelRoot.traverse(n=>{
      if (n.geometry) n.geometry.dispose();
      if (n.material) [].concat(n.material).forEach(m=>{ if(m.map&&m.map!==wallTex&&m.map!==floorTex&&m.map!==ceilTex) m.map.dispose(); m.dispose(); });
    });
    while (levelRoot.children.length) levelRoot.remove(levelRoot.children[0]);
    enemies.length=pickups.length=torches.length=fireLights.length=gates.length=gibs.length=0;
    levelExit={x:1.5,z:1.5,group:null,glow:null,seed:Math.random()*Math.PI*2};
    if (advTimer) { clearTimeout(advTimer); advTimer=null; }
  }

  function updateGibs(dt) {
    for (let i=gibs.length-1;i>=0;i--) {
      const g=gibs[i]; g.t+=dt; g.v.y-=9*dt;
      g.m.position.add(g.v.clone().multiplyScalar(dt));
      g.m.material.opacity=Math.max(0,1-g.t/g.life);

  }

  // ── Torches ──────────────────────────────────────────────────────────────────
  function addTorches() {
    const dirs=[{dx:1,dz:0},{dx:-1,dz:0},{dx:0,dz:1},{dx:0,dz:-1}];

    // Collect every valid wall-face anchor across the whole map
    const candidates=[];
    const usedFace=new Set();
    for (let z=1;z<worldH-1;z++) for (let x=1;x<worldW-1;x++) {
      if (!isSolid(currentMap[z][x])) continue;
      for (const d of dirs) {
        const nx=x+d.dx,nz=z+d.dz;
        if (nx<0||nz<0||nx>=worldW||nz>=worldH) continue;
        if (isSolid(currentMap[nz][nx])) continue;
        const fk=`${x},${z},${d.dx},${d.dz}`;
        if (usedFace.has(fk)) continue; usedFace.add(fk);
        candidates.push({ wx:(x+0.5)+d.dx*0.52, wz:(z+0.5)+d.dz*0.52 });
      }
    }

    // Shuffle deterministically so the spread looks natural but consistent
    for (let i=candidates.length-1;i>0;i--) {
      const j=Math.floor(Math.sin(i*127.1+worldW*31.4)*43758.5453%1*i+i)%i;
      [candidates[i],candidates[j]]=[candidates[j],candidates[i]];
    }

    // Select torches spaced at least MIN_DIST units apart (ensures full coverage)
    const MIN_DIST = 3.8;
    const chosen=[];
    for (const c of candidates) {
      if (chosen.every(p=>Math.hypot(p.wx-c.wx,p.wz-c.wz)>=MIN_DIST)) chosen.push(c);
      if (chosen.length>=28) break;
    }

    // Build each torch
    const mountMat=new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.8,metalness:0.4});
    chosen.forEach((c,i)=>{
      const mt=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.32,0.06),mountMat);
      mt.position.set(c.wx,0.82,c.wz); levelRoot.add(mt);
      const fl=new THREE.Mesh(
        new THREE.SphereGeometry(0.09,6,5),
        new THREE.MeshBasicMaterial({color:0xff8822,transparent:true,opacity:0.9})
      );
      fl.position.set(c.wx,1.1,c.wz); levelRoot.add(fl);
      let light=null;
      if (i%2===0) {
        light=new THREE.PointLight(0xff7722,0.6,5.0,1.6);
        light.position.set(c.wx,1.12,c.wz); levelRoot.add(light);
      }
      const embers=[];
      for (let j=0;j<4;j++) {
        const em=new THREE.Mesh(
          new THREE.SphereGeometry(0.025,4,3),
          new THREE.MeshBasicMaterial({color:0xff5500,transparent:true,opacity:0.8})
        );
        em.position.set(c.wx,1.1,c.wz); levelRoot.add(em);
        embers.push({m:em,bx:c.wx,by:1.1,bz:c.wz,age:Math.random(),life:0.6+Math.random()*0.5,ph:Math.random()*Math.PI*2,lat:0.04+Math.random()*0.04,rise:0.22+Math.random()*0.2});
      }
      torches.push({light,flame:fl,embers,ph:Math.random()*Math.PI*2,pulse:0.14+Math.random()*0.1,bi:0.6});
    });
  }

  // ── Castle decorations ───────────────────────────────────────────────────────
  function addCastleDecorations() {
    const rng=n=>{const x=Math.sin(currentLevel*127.1+n*311.7+1.5)*43758.5453;return x-Math.floor(x);};
    
    // Find spawn point for buffer zone
    let spawnX=1.5, spawnZ=1.5;
    for(let z=0;z<worldH;z++) for(let x=0;x<worldW;x++) {
      if(currentMap[z][x]===2) { spawnX=x+0.5; spawnZ=z+0.5; }
    }
    
    // Collect valid decoration spots (actual L-shaped corners, not hallways)
    const decorCells=[];
    for(let z=2;z<worldH-2;z+=1) for(let x=2;x<worldW-2;x+=1) {
      if(!isSolid(currentMap[z][x])&&currentMap[z][x]!==2&&currentMap[z][x]!==3&&currentMap[z][x]!==6) {
        // Check for L-shaped corner (perpendicular walls, not opposite/hallway)
        const up=z-1>=0 && isSolid(currentMap[z-1][x]);
        const down=z+1<worldH && isSolid(currentMap[z+1][x]);
        const left=x-1>=0 && isSolid(currentMap[z][x-1]);
        const right=x+1<worldW && isSolid(currentMap[z][x+1]);
        
        // L-corner: has perpendicular walls, not straight line
        const isCorner=(up||down)&&(left||right)&&!(up&&down)&&!(left&&right);
        
        if(isCorner) {
          // Keep buffer zone around spawn (at least 3 units away)
          const dx=x+0.5-spawnX, dz=z+0.5-spawnZ;
          const dist=Math.sqrt(dx*dx+dz*dz);
          if(dist>=3) {
            decorCells.push({x:x+0.5,z:z+0.5});
          }
        }
      }
    }
    sShuf(decorCells, currentLevel*37+9);
    
    const decorCount=Math.min(Math.floor(decorCells.length*0.12), 25);
    for(let d=0;d<decorCount;d++) {

  function updateTorches(t,dt) {
    torches.forEach(tr=>{
      const fl=Math.sin(t*7.4+tr.ph)*tr.pulse+Math.sin(t*15.1+tr.ph*1.8)*(tr.pulse*0.44);
      const in2=Math.max(0.18,tr.bi+fl);
      if (tr.light) tr.light.intensity=in2;
      const sc=0.8+in2*0.38; tr.flame.scale.set(sc,sc+0.1,sc);
      tr.embers.forEach(em=>{
        em.age+=dt; if(em.age>=em.life){em.age=0;em.ph=Math.random()*Math.PI*2;em.lat=0.03+Math.random()*0.05;em.rise=0.2+Math.random()*0.22;em.life=0.5+Math.random()*0.6;}
        const cy=em.age/em.life;
        em.m.position.set(em.bx+Math.sin(t*4.8+em.ph)*em.lat*cy,em.by+cy*em.rise,em.bz+Math.cos(t*4.1+em.ph)*em.lat*cy);
        em.m.material.opacity=Math.max(0,0.8*(1-cy));
        const es=0.6+(1-cy)*0.55; em.m.scale.setScalar(es);
      });
    });
    fireLights.forEach(fl2=>{
      const f=Math.sin(t*8.6+fl2.ph)*fl2.pulse+Math.sin(t*18+fl2.ph*1.7)*(fl2.pulse*0.4);
      const in2=Math.max(0.5,fl2.bi+f); fl2.light.intensity=in2;
      const fs=0.84+in2*0.17; fl2.flame.scale.set(fs*0.9,fs*1.1,fs*0.9);
      fl2.flame.material.opacity=Math.min(0.96,0.7+in2*0.16);
    });
  }

  // ── Procedural level generator ───────────────────────────────────────────────
  function generateLevel(idx) {
    // Seeded PRNG — unique per level index
    const rng = n => { const x=Math.sin(idx*127.1+n*311.7+1.5)*43758.5453; return x-Math.floor(x); };
    const rndInt = (n,lo,hi) => lo + Math.floor(rng(n)*(hi-lo+1));

    // Map size grows every cycle
    const cycle = Math.floor(idx/LEVELS.length);
    const W = Math.min(22 + cycle*2, 34);
    const H = Math.min(16 + cycle*2, 28);

    // Start all-wall
    const map = Array.from({length:H}, ()=>new Array(W).fill(1));
    const carveRect = (x1,z1,x2,z2) => {
      for(let z=z1;z<=z2;z++) for(let x=x1;x<=x2;x++)
        if(x>0&&x<W-1&&z>0&&z<H-1) map[z][x]=0;
    };
    const carveH = (z,x1,x2) => { const mn=Math.min(x1,x2),mx=Math.max(x1,x2); for(let x=mn;x<=mx;x++) if(x>0&&x<W-1&&z>0&&z<H-1) map[z][x]=0; };
    const carveV = (x,z1,z2) => { const mn=Math.min(z1,z2),mx=Math.max(z1,z2); for(let z=mn;z<=mx;z++) if(x>0&&x<W-1&&z>0&&z<H-1) map[z][x]=0; };

    // Barrier column — solid wall, only broken at the gate row
    const barrierX = Math.floor(W*0.62);
    const gateZ    = rndInt(901, 2, H-3);

    // ── Generate rooms in the left zone ─────────────────────────────
    const maxRW = Math.min(4+Math.floor(idx/2.5), 8);
    const maxRH = Math.min(4+Math.floor(idx/2.5), 8);
    const minRW = Math.max(3, Math.min(3, 2+Math.floor(idx/8)));
    const minRH = Math.max(3, Math.min(3, 2+Math.floor(idx/8)));
    const targetRooms = Math.min(4+Math.floor(idx*0.65), 12);
    const rooms = [];
    for(let att=0; att<500&&rooms.length<targetRooms; att++) {
      const rw=rndInt(att*3+1, minRW, maxRW);
      const rh=rndInt(att*3+2, minRH, maxRH);
      const rx=rndInt(att*3+3, 1, Math.max(1, barrierX-rw-2));
      const rz=rndInt(att*3+4, 1, H-rh-2);
      if(rx<1||rx+rw>=barrierX||rz<1||rz+rh>=H-1) continue;
      if(rooms.some(r=>rx<=r.x2+1&&rx+rw>=r.x1-1&&rz<=r.z2+1&&rz+rh>=r.z1-1)) continue;
      rooms.push({x1:rx,z1:rz,x2:rx+rw-1,z2:rz+rh-1,cx:rx+Math.floor(rw/2),cz:rz+Math.floor(rh/2)});
      carveRect(rx,rz,rx+rw-1,rz+rh-1);
    }
    if(rooms.length<2) return LEVELS[idx%LEVELS.length]; // fallback

    // Connect rooms with L-corridors
    for(let i=0;i<rooms.length-1;i++) {
      const a=rooms[i], b=rooms[i+1];
      if(rng(i+500)<0.5){ carveH(a.cz,a.cx,b.cx); carveV(b.cx,a.cz,b.cz); }
      else               { carveV(a.cx,a.cz,b.cz); carveH(b.cz,a.cx,b.cx); }
    }
    
    // ── Extra cross-connections for higher complexity ──────────────────
    const extraConnections = Math.min(Math.floor(idx/2), rooms.length-2);
    for(let c=0;c<extraConnections;c++){
      const i1=rndInt(600+c*37, 0, rooms.length-2);
      const i2=rndInt(700+c*37, i1+1, rooms.length-1);
      const a=rooms[i1], b=rooms[i2];
      // 50/50 which corridor axis comes first
      if(rng(800+c)<0.5){ carveH(a.cz,a.cx,b.cx); carveV(b.cx,a.cz,b.cz); }
      else               { carveV(a.cx,a.cz,b.cz); carveH(b.cz,a.cx,b.cx); }
    }
    
    // ── Add maze-like dead ends at higher levels ─────────────────────
    const mazeComplexity = Math.min(Math.floor(idx/4), 8);
    for(let m=0;m<mazeComplexity;m++){
      const roomIdx = rndInt(1200+m*17, 1, rooms.length-1);
      const r = rooms[roomIdx];
      // Pick random edge of room and carve a short dead-end corridor
      const edge = rndInt(1300+m*17, 0, 3); // 0=north, 1=east, 2=south, 3=west
      const length = rndInt(1400+m*17, 2, 4);
      if(edge===0){ // north
        for(let i=0;i<length;i++) if(r.cz-i-1>0) carveH(r.cz-i-1, r.cx-1, r.cx+1);
      } else if(edge===1){ // east
        for(let i=0;i<length;i++) if(r.cx+i+1<W-1) carveV(r.cx+i+1, r.cz-1, r.cz+1);
      } else if(edge===2){ // south
        for(let i=0;i<length;i++) if(r.cz+i+1<H-1) carveH(r.cz+i+1, r.cx-1, r.cx+1);
      } else { // west
        for(let i=0;i<length;i++) if(r.cx-i-1>0) carveV(r.cx-i-1, r.cz-1, r.cz+1);
      }
    }

    // ── Gate corridor through barrier ────────────────────────────────
    const connector = rooms.reduce((best,r)=>r.cx>best.cx?r:best, rooms[0]);
    carveV(connector.cx, connector.cz, gateZ);
    carveH(gateZ, connector.cx, barrierX+2);
    map[gateZ][barrierX] = 7; // gate

    // ── Exit zone (right of barrier) ─────────────────────────────────
    const ezX1=barrierX+2, ezZ1=1, ezX2=W-2, ezZ2=H-2;
    carveRect(ezX1,ezZ1,ezX2,ezZ2);
    // Scatter decorative pillars - more at higher levels
    const pillarDensity = Math.min(0.2 + idx*0.05, 0.6);
    for(let z=ezZ1+2;z<ezZ2-1;z+=3) for(let x=ezX1+2;x<ezX2-1;x+=4)
      if(rng(z*71+x)<pillarDensity) map[z][x]=1;

    // ── Place special tiles ───────────────────────────────────────────
    map[rooms[0].cz][rooms[0].cx] = 2; // spawn in first room

    // Exit: towards the far end of the exit zone
    const exitX = ezX1+Math.floor((ezX2-ezX1)*0.7);
    const exitZ = ezZ1+Math.floor((ezZ2-ezZ1)*0.65);
    map[exitZ][exitX] = 3;

    // Key: corner of the room FURTHEST from spawn
    const sp=rooms[0];
    const keyRoom=rooms.reduce((best,r)=>r!==sp&&Math.hypot(r.cx-sp.cx,r.cz-sp.cz)>Math.hypot(best.cx-sp.cx,best.cz-sp.cz)?r:best, rooms[1]);
    const kx=keyRoom.x1+1, kz=keyRoom.z1+1;
    map[map[kz][kx]===0?kz:keyRoom.cz][map[kz][kx]===0?kx:keyRoom.cx] = 6;

    // ── Enemies ───────────────────────────────────────────────────────
    const typePool = cycle>=3?['grunt','soldier','brute','spectre','fiend','goliath']:
                     cycle>=2?['grunt','soldier','brute','spectre','fiend']:
                     cycle>=1?['grunt','soldier','brute','spectre']:['grunt','soldier'];
    const hardPool = typePool.filter(t=>t!=='grunt');
    const enemies = [];
    const spawnPX = rooms[0].cx+0.5, spawnPZ = rooms[0].cz+0.5;
    const MIN_SAFE = 5.5; // enemies must be at least this far from spawn
    // Rooms: skip spawn room, scale enemies with level and room index
    for(let ri=1;ri<rooms.length;ri++) {
      const r=rooms[ri];
      const count=Math.min(1+Math.floor(idx*0.22)+Math.floor(ri*0.4), 4);
      for(let e=0;e<count;e++) {
        const ex=r.x1+1+Math.floor(rng(ri*91+e*17+600)*Math.max(1,r.x2-r.x1-1));
        const ez=r.z1+1+Math.floor(rng(ri*91+e*17+700)*Math.max(1,r.z2-r.z1-1));
        if(ex>0&&ez>0&&ex<W-1&&ez<H-1&&!isSolid(map[ez][ex])
           &&Math.hypot(ex+0.5-spawnPX, ez+0.5-spawnPZ)>=MIN_SAFE)
          enemies.push({x:ex+0.5, z:ez+0.5, type:typePool[Math.floor(rng(ri*91+e*17+800)*typePool.length)]});
      }
    }
    // Exit zone guardians
    const guardCount = Math.min(1+Math.floor(idx*0.2), 4);
    for(let g=0;g<guardCount;g++) {
      const ex=ezX1+2+Math.floor(rng(g+900)*Math.max(1,ezX2-ezX1-3));
      const ez=ezZ1+1+Math.floor(rng(g+950)*Math.max(1,ezZ2-ezZ1-1));
      if(ex>0&&ez>0&&ex<W-1&&ez<H-1&&!isSolid(map[ez][ex]))
        enemies.push({x:ex+0.5, z:ez+0.5, type:hardPool.length?hardPool[Math.floor(rng(g+999)*hardPool.length)]:'soldier'});
    }

    // ── Pickups ────────────────────────────────────────────────────────
    const pickups = [];
    for(let ri=1;ri<rooms.length;ri++) {
      if(rng(ri+1000)<0.65)
        pickups.push({x:rooms[ri].cx+0.5, z:rooms[ri].cz+0.5, type:rng(ri+1100)<0.38?'medkit':'ammo'});
    }
    // Ammo near the gate as a reward for reaching the key area
    if(!isSolid(map[gateZ]?.[barrierX-2]||1))
      pickups.push({x:barrierX-2+0.5, z:gateZ+0.5, type:'ammo'});
    // Gun upgrade every 2 levels — placed in the room second-farthest from spawn
    if(idx%2===1) {
      const upCandidates=rooms.filter(r=>r!==rooms[0]&&r!==keyRoom)
        .sort((a,b)=>Math.hypot(b.cx-rooms[0].cx,b.cz-rooms[0].cz)-Math.hypot(a.cx-rooms[0].cx,a.cz-rooms[0].cz));
      const upRoom=upCandidates[0]||rooms[Math.min(1,rooms.length-1)];
      pickups.push({x:upRoom.cx+0.5, z:upRoom.cz+0.5, type:'upgrade'});
    }

    // ── Fireplaces ────────────────────────────────────────────────────
    const fireplaces = rooms.length>1 ? [{x:rooms[Math.floor(rooms.length/2)].cx, z:rooms[Math.floor(rooms.length/2)].cz}] : [];

    // ── Atmosphere cycles through 3 moods ─────────────────────────────
    const atm = idx%3;
    return {
      name:`Sector ${idx+1}`,
      fogColor: [0x050810,0x020508,0x080408][atm],
      fogDensity: Math.max(0.13, 0.20-Math.floor(idx/5)*0.01),
      ambCol: [0x3a4560,0x2a3050,0x3a2040][atm],
      ambInt: 0.26,
      fireplaces, map, enemies, pickups,
    };
  }

  // ── Load level ───────────────────────────────────────────────────────────────
  function loadLevel(idx, keepStats) {
    clearLevel();
    const lvl=generateLevel(idx);
    const fc=new THREE.Color(lvl.fogColor);
    scene.fog.color.copy(fc); scene.fog.density=lvl.fogDensity; scene.background.copy(fc);
    ambient.color.setHex(lvl.ambCol); ambient.intensity=lvl.ambInt;
    currentMap=lvl.map.map(r=>[...r]); sealBorders(currentMap);
    worldW=currentMap[0].length; worldH=currentMap.length;

    // Floor & ceiling
    const fGeo=new THREE.PlaneGeometry(worldW,worldH); fGeo.rotateX(-Math.PI/2); fGeo.translate(worldW/2,0,worldH/2);
    levelRoot.add(new THREE.Mesh(fGeo,new THREE.MeshStandardMaterial({map:floorTex,roughness:0.95,metalness:0.01})));
    const cGeo=new THREE.PlaneGeometry(worldW,worldH); cGeo.rotateX(Math.PI/2); cGeo.translate(worldW/2,WALL_H,worldH/2);
    levelRoot.add(new THREE.Mesh(cGeo,new THREE.MeshStandardMaterial({map:ceilTex,roughness:0.98})));

    // Walls (instanced) + special cells
    const wallGeo=new THREE.BoxGeometry(1,WALL_H,1);
    const solids=[];
    const mapKeys=[];
    let spawnX=1.5,spawnZ=1.5,exitX=worldW-1.5,exitZ=worldH-1.5;
    for (let z=0;z<worldH;z++) for (let x=0;x<worldW;x++) {
      const v=currentMap[z][x], px=x+0.5, pz=z+0.5;
      if (v===1) { solids.push({px,pz}); }
      if (v===7) {
        // Build a wrought-iron gate from individual bars
        const gGrp=new THREE.Group();
        const iMat=new THREE.MeshStandardMaterial({color:0x0c0e14,emissive:0x1e0a04,emissiveIntensity:0.28,roughness:0.92,metalness:0.82});
        const bar=(bw,bh,bd,bx,by)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),iMat);m.position.set(bx,by,0);gGrp.add(m);};
        // Outer frame
        bar(0.06,1.68,0.06,-0.41, 0);   // left post
        bar(0.06,1.68,0.06, 0.41, 0);   // right post
        bar(0.88,0.06,0.06, 0, 0.81);   // top rail
        bar(0.88,0.06,0.06, 0,-0.81);   // bottom rail
        // Two horizontal cross-rails
        bar(0.88,0.045,0.045, 0, 0.30);
        bar(0.88,0.045,0.045, 0,-0.30);
        // Six vertical pickets + spear-tip cones
        [-0.30,-0.18,-0.06,0.06,0.18,0.30].forEach(bx=>{
          bar(0.045,1.56,0.045, bx, 0);
          const tip=new THREE.Mesh(new THREE.ConeGeometry(0.046,0.18,4),iMat);
          tip.position.set(bx,0.93,0); gGrp.add(tip);
        });
        // Centre ornamental cross (scroll-work accent)
        bar(0.20,0.04,0.04, 0, 0.52);   // horizontal arm
        bar(0.04,0.20,0.04, 0, 0.52);   // vertical arm
        // Diagonal decorative spurs on the ornament
        const mkDiag=(angle,ox,oy)=>{const d=new THREE.Mesh(new THREE.BoxGeometry(0.13,0.032,0.032),iMat);d.position.set(ox,oy,0);d.rotation.z=angle;gGrp.add(d);};
        mkDiag( 0.75, 0.07, 0.59); mkDiag(-0.75,-0.07, 0.59);
        mkDiag(-0.75, 0.07, 0.45); mkDiag( 0.75,-0.07, 0.45);
        gGrp.position.set(px,0.84,pz);
        gGrp.rotation.y=Math.PI/2;
        levelRoot.add(gGrp);
        gates.push({x,z,m:gGrp,opened:false});
      }
      if (v===2) { spawnX=px; spawnZ=pz; }
      if (v===3) { exitX=px; exitZ=pz; }
      if (v===6) { mapKeys.push({x:px,z:pz,type:'key'}); }
    }
    if (solids.length) {
      const iw=new THREE.InstancedMesh(wallGeo,wallMat,solids.length);
      const m4=new THREE.Matrix4();
      solids.forEach((p,i)=>{ m4.makeTranslation(p.px,WALL_H/2,p.pz); iw.setMatrixAt(i,m4); });
      iw.instanceMatrix.needsUpdate=true; levelRoot.add(iw);
    }

    addTorches();
    addCastleDecorations();
    addFireplaces(lvl.fireplaces||[]);
    buildPortal(exitX,exitZ);
    // Difficulty scaling — grows every full cycle through the 3 maps
    const diff=getDifficulty(idx);
    const cycle=Math.floor(idx/LEVELS.length);

    // Build enemy list: base template + extra difficulty enemies
    const allEnemies=[...(lvl.enemies||[])];
    if (diff.extra>0) {
      // Collect walkable open cells for extra spawns
      const openCells=[];
      for(let ez=3;ez<worldH-3;ez+=2) for(let ex=3;ex<worldW-3;ex+=2)
        if (!isSolid(currentMap[ez][ex])) openCells.push({x:ex+0.5,z:ez+0.5});
      sShuf(openCells, idx*31+7);
      // Unlock harder types as cycles progress
      const pool=cycle>=3?['spectre','fiend','goliath','brute','soldier']:
                 cycle>=2?['spectre','fiend','brute','soldier']:
                 cycle>=1?['spectre','soldier','brute']:['grunt','soldier'];
      for(let i=0;i<Math.min(diff.extra,openCells.length);i++) {
        const t=pool[Math.floor(Math.abs(Math.sin(idx*17+i*13))*pool.length)%pool.length];
        allEnemies.push({x:openCells[i].x,z:openCells[i].z,type:t});
      }
    }
    spawnEnemies(allEnemies, diff, spawnX, spawnZ);

    // Pickups: base level pickups + map keys + bonus ammo on higher cycles
    const allPickups=[...(lvl.pickups||[]),...mapKeys];
    if (cycle>0) {
      const bonusCells=[];
      for(let ez=2;ez<worldH-2;ez+=3) for(let ex=2;ex<worldW-2;ex+=3)
        if(!isSolid(currentMap[ez][ex])) bonusCells.push({x:ex+0.5,z:ez+0.5});
      sShuf(bonusCells, idx*53+11);
      const bonusCount=Math.min(cycle*2, bonusCells.length);
      for(let i=0;i<bonusCount;i++)
        allPickups.push({x:bonusCells[i].x,z:bonusCells[i].z,type:i%3===0?'medkit':'ammo'});
    }
    spawnPickups(allPickups);

    // Spawn yaw: face first open direction
    const sc=Math.floor(spawnX),sz2=Math.floor(spawnZ);
    const dirs4=[{y:Math.PI/2,dx:-1,dz:0},{y:0,dx:0,dz:-1},{y:-Math.PI/2,dx:1,dz:0},{y:Math.PI,dx:0,dz:1}];
    let sy=Math.PI/2;
    for (const d of dirs4) {
      const cr=sz2+d.dz,cc=sc+d.dx;
      if (cr>=0&&cr<worldH&&cc>=0&&cc<worldW&&!isSolid(currentMap[cr][cc])){sy=d.y;break;}
    }
    player.x=spawnX; player.z=spawnZ; player.pitch=0; player.yaw=sy;
    player.hasKey=false; player.levelKills=0;
    if (!keepStats) { player.health=100; player.ammo=24; player.campaignKills=0; player.gunTier=0; }
    statusEl.textContent=`${lvl.name} — Find the key and reach the exit.`;
    updateHud(); updateCamera();
  }

  // ── Enemies ──────────────────────────────────────────────────────────────────
  function spawnEnemies(list, diff, spawnX, spawnZ) {
    const D=diff||{hpMult:1,spdMult:1,dmgMult:1};
    const geo=new THREE.PlaneGeometry(0.96,1.24);
    const occupied=[];
    list.forEach((e,i)=>{
      const type=e.type||'grunt';
      const et=ETYPES[type]||ETYPES.grunt;
      const isSpectre=type==='spectre';
      const isFiend=type==='fiend';
      const mat=new THREE.MeshBasicMaterial({
        map:mkEnemyTex(type,false),transparent:true,
        alphaTest:isSpectre?0.05:0.15,
        opacity:isSpectre?0.58:1.0,
        depthWrite:!isSpectre,side:THREE.DoubleSide
      });
      const mesh=new THREE.Mesh(geo,mat);
      mesh.scale.set(et.sx,et.sy,1); mesh.renderOrder=isSpectre?4:3; mesh.frustumCulled=false;
      const sp=safeSpawn(e.x,e.z,occupied,spawnX,spawnZ);
      const baseY=isFiend?1.38:0.78;
      mesh.position.set(sp.x,baseY,sp.z);
      mesh.userData={
        alive:true,dying:0,deathT:0,type,
        hp:   Math.max(1,Math.round(et.hp   * D.hpMult)),
        spd:  et.spd  * D.spdMult,
        dmg:  Math.max(1,Math.round(et.dmg  * D.dmgMult)),
        acd:  et.acd*0.5+Math.random()*et.acd*0.5,
        ar:et.ar, bsx:et.sx, bsy:et.sy,
        hx:sp.x, hz:sp.z, px:sp.x, pz:sp.z,
        stuckT:0, lunge:0, wA:Math.random()*Math.PI*2, wT:0,
        bs:Math.random()*Math.PI*2,
        state:'patrol', alertT:0, id:i, origColor:null,
        baseY, isFlying:isFiend,
      };
      enemies.push(mesh); levelRoot.add(mesh); occupied.push({x:sp.x,z:sp.z});
    });
  }

  function safeSpawn(x,z,occ,spawnX,spawnZ) {
    if (canMoveTo(x,z,0.26)&&occ.every(o=>Math.hypot(o.x-x,o.z-z)>0.7)&&Math.hypot(x-spawnX,z-spawnZ)>=4) return {x,z};
    for (let r=0.1;r<=3;r+=0.1) for (let a=0;a<Math.PI*2;a+=Math.PI/18) {
      const nx=x+Math.cos(a)*r,nz=z+Math.sin(a)*r;
      if (canMoveTo(nx,nz,0.26)&&occ.every(o=>Math.hypot(o.x-nx,o.z-nz)>0.7)&&Math.hypot(nx-spawnX,nz-spawnZ)>=4) return{x:nx,z:nz};
    }
    return{x,z};
  }

  function updateEnemies(dt) {
    const er=0.26;
    enemies.forEach(e=>{
      const d=e.userData;
      e.lookAt(camera.position.x,e.position.y,camera.position.z);
      if (!d.alive) {
        if (d.dying>0) { d.dying=Math.max(0,d.dying-dt*2); d.deathT+=dt; e.material.opacity=d.dying; e.scale.set(d.bsx*(0.7+d.dying*0.3),d.bsy*Math.max(0.12,d.dying),1); e.position.y=0.3+d.dying*0.48; }
        return;
      }
      const pdx=player.x-e.position.x,pdz=player.z-e.position.z,dist=Math.hypot(pdx,pdz);
      const sees=dist<14&&hasLOS(e.position.x,e.position.z,player.x,player.z);
      const t=performance.now()*0.001+d.bs;
      if (sees) { d.state='chase'; d.alertT=4; }
      else if (d.alertT>0) { d.alertT-=dt; if(d.alertT<=0) d.state='patrol'; }
      if (d.state==='chase') {
        if (dist>0.02) {
          const nx=e.position.x+(pdx/dist)*d.spd*dt, nz=e.position.z+(pdz/dist)*d.spd*dt;
          if (canMoveTo(nx,nz,er)) { e.position.x=nx; e.position.z=nz; }
          else { if(canMoveTo(nx,e.position.z,er)) e.position.x=nx; if(canMoveTo(e.position.x,nz,er)) e.position.z=nz; }
        }
        const mv=Math.hypot(e.position.x-d.px,e.position.z-d.pz);
        if (dist>0.9&&mv<0.003) d.stuckT+=dt; else d.stuckT=Math.max(0,d.stuckT-dt*0.8);
        if (d.stuckT>0.6) { const ns=safeSpawn(e.position.x,e.position.z,[]); e.position.x=ns.x; e.position.z=ns.z; d.stuckT=0; }
      } else {
        d.wT-=dt; if(d.wT<=0){d.wA+=(Math.random()-0.5)*1.4;d.wT=1+Math.random()*2;}
        const wx=e.position.x+Math.cos(d.wA)*d.spd*0.4*dt, wz=e.position.z+Math.sin(d.wA)*d.spd*0.4*dt;
        if (Math.hypot(wx-d.hx,wz-d.hz)<4&&canMoveTo(wx,wz,er)){e.position.x=wx;e.position.z=wz;}
        else {d.wA+=Math.PI;d.wT=0;}
      }
      d.px=e.position.x; d.pz=e.position.z;
      if (dist<1.8) d.lunge=Math.min(1,d.lunge+dt*3); else d.lunge=Math.max(0,d.lunge-dt*2);
      // Flying enemies oscillate; goliath bobs heavily; others stay low
      if (d.isFlying) {
        e.position.y=d.baseY+Math.sin(t*4.5+d.bs)*0.32+(d.lunge*-0.3); // dive when lunging
      } else if (d.type==='goliath') {
        e.position.y=d.baseY+Math.sin(t*1.8)*0.06;
      } else {
        e.position.y=d.baseY+Math.sin(t*3)*0.03;
      }
      e.scale.set(d.bsx*(1+d.lunge*0.06),d.bsy*(1+d.lunge*0.09),1);
      d.acd=Math.max(0,d.acd-dt);
      if (dist<d.ar&&d.acd<=0&&player.health>0) {
        player.health=Math.max(0,player.health-(d.dmg+Math.floor(Math.random()*4)-1));
        player.dmgTimer=0.28; d.acd=ETYPES[d.type].acd*0.7+Math.random()*ETYPES[d.type].acd*0.5;
        sfx.hurt(); setTimeout(()=>{hFlash.style.opacity='0';},95);
        shake.hT=0.13; shake.hS=0.055;

        if (player.health<=0) setGameState('gameover');
      }
    });
  }

  // ── Pickups ──────────────────────────────────────────────────────────────────
  function spawnPickups(list) {
    const medMat=new THREE.MeshStandardMaterial({color:0x55dd88,emissive:0x114422,roughness:0.55,metalness:0.1});
    const amMat =new THREE.MeshStandardMaterial({color:0x77aaee,emissive:0x0e2444,roughness:0.5,metalness:0.2});
    const kMat  =new THREE.MeshStandardMaterial({color:0xf0d050,emissive:0x5a3808,roughness:0.35,metalness:0.65});
    list.forEach(p=>{
      const g=new THREE.Group();
      if (p.type==='medkit') {
        g.add(new THREE.Mesh(new THREE.BoxGeometry(0.22,0.13,0.22),medMat));
        const ch=new THREE.Mesh(new THREE.BoxGeometry(0.11,0.03,0.03),new THREE.MeshBasicMaterial({color:0xddfff0})); ch.position.y=0.07; g.add(ch);
        const cv=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.11,0.03),new THREE.MeshBasicMaterial({color:0xddfff0})); cv.position.y=0.07; g.add(cv);
      } else if (p.type==='ammo') {
        g.add(new THREE.Mesh(new THREE.BoxGeometry(0.26,0.13,0.15),amMat));
        const s=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.04,0.03),new THREE.MeshBasicMaterial({color:0xccdfff})); s.position.set(0,0.07,0.07); g.add(s);
      } else if (p.type==='upgrade') {
        // Glowing cyan orb — gun upgrade
        const orb=new THREE.Mesh(new THREE.SphereGeometry(0.13,10,8),new THREE.MeshStandardMaterial({color:0x00aaff,emissive:0x0055ff,emissiveIntensity:1.4,roughness:0.15,metalness:0.9}));
        const shell=new THREE.Mesh(new THREE.SphereGeometry(0.2,10,8),new THREE.MeshBasicMaterial({color:0x0044ff,transparent:true,opacity:0.22,side:THREE.BackSide}));
        const ring1=new THREE.Mesh(new THREE.TorusGeometry(0.17,0.018,6,18),new THREE.MeshBasicMaterial({color:0x44ccff}));
        const ring2=new THREE.Mesh(new THREE.TorusGeometry(0.17,0.018,6,18),new THREE.MeshBasicMaterial({color:0x44ccff}));
        ring2.rotation.y=Math.PI/2;
        const glow=new THREE.PointLight(0x0066ff,0.9,3.5,2);
        g.add(orb,shell,ring1,ring2,glow);
        g.position.set(p.x,0.5,p.z);
        levelRoot.add(g);
        pickups.push({type:'upgrade',mesh:g,baseY:0.5,ph:Math.random()*Math.PI*2,taken:false});
        return; // skip the default push below
      } else if (p.type==='key') {
        const ring=new THREE.Mesh(new THREE.TorusGeometry(0.09,0.028,8,14),kMat); ring.rotation.y=Math.PI/2; g.add(ring);
        const st=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.03,0.03),kMat); st.position.x=0.11; g.add(st);
        const t1=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.055,0.03),kMat); t1.position.set(0.18,-0.025,0); g.add(t1);
        const t2=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.04,0.03),kMat); t2.position.set(0.22,-0.01,0); g.add(t2);
      }
      g.position.set(p.x,0.3,p.z); levelRoot.add(g);
      pickups.push({type:p.type,mesh:g,baseY:0.3,ph:Math.random()*Math.PI*2,taken:false});
    });
  }

  function updatePickups(dt,elapsed) {
    pickups.forEach(p=>{
      if (p.taken) return;
      p.mesh.rotation.y+=dt*1.7;
      p.mesh.position.y=p.baseY+Math.sin(elapsed*2.7+p.ph)*0.055;
      if (Math.hypot(p.mesh.position.x-player.x,p.mesh.position.z-player.z)>0.44) return;
      p.taken=true; if(p.mesh.parent) p.mesh.parent.remove(p.mesh);
      if (p.type==='medkit') {
        player.health=Math.min(100,player.health+25);
        pkFlash.style.background='rgba(80,220,130,0.22)'; statusEl.textContent='Medkit — +25 HP';
      } else if (p.type==='ammo') {
        player.ammo=Math.min(player.maxAmmo,player.ammo+20);
        pkFlash.style.background='rgba(100,175,255,0.22)'; statusEl.textContent='Ammo — +20 rounds';
      } else if (p.type==='upgrade') {
        player.gunTier=Math.min(player.gunTier+1,4);
        pkFlash.style.background='rgba(0,130,255,0.32)';
        const desc=['single shot','power shot','3-round spread','heavy spread','5-round burst'][player.gunTier];
        statusEl.textContent=`Gun upgrade! Tier ${player.gunTier} — ${desc}`;
      } else {
        player.hasKey=true; pkFlash.style.background='rgba(240,210,80,0.25)';
        statusEl.textContent='Key found — the gate is open!'; unlockGates();
      }
      pkFlash.style.opacity='0.95'; setTimeout(()=>{pkFlash.style.opacity='0';},120);
      sfx.pickup(p.type);
      updateHud();
    });
  }

  // ── Exit ─────────────────────────────────────────────────────────────────────
  function updateExit(elapsed) {
    if (!levelExit.group) return;
    const pulse=0.66+Math.sin(elapsed*3+levelExit.seed)*0.2;
    levelExit.group.rotation.y+=0.006;
    levelExit.glow.scale.setScalar(0.86+pulse*0.24);
    levelExit.glow.material.opacity=Math.max(0.42,pulse);
    const dist=Math.hypot(levelExit.x-player.x,levelExit.z-player.z);
    if (dist<0.58&&player.health>0) {
      if (!player.hasKey) statusEl.textContent='Portal sealed — you need the key.';
      else onLevelComplete();
    }
  }

  // ── Movement ─────────────────────────────────────────────────────────────────
  function updateMovement(dt) {
    let mx=0,mz=0;
    const cos=Math.cos(player.yaw), sin=Math.sin(player.yaw);
    // Standard FPS: W=forward, S=backward, A=strafe left, D=strafe right
    if (move.fwd)  { mx+=sin; mz+=cos; }
    if (move.bck)  { mx-=sin; mz-=cos; }
    if (move.lft)  { mx-=cos; mz+=sin; }
    if (move.rgt)  { mx+=cos; mz-=sin; }
    const len=Math.hypot(mx,mz);
    player.moving=len>0.001;
    if (player.moving) {
      mx/=len; mz/=len;
      const nx=player.x+mx*player.speed*dt, nz=player.z+mz*player.speed*dt;
      if (canMoveTo(nx,player.z,player.radius)) player.x=nx;
      if (canMoveTo(player.x,nz,player.radius)) player.z=nz;
      player.bobPhase+=dt*7.8;
    }
  }

  // ── Camera ───────────────────────────────────────────────────────────────────
  function updateCamera() {
    const bob=player.moving?Math.sin(player.bobPhase)*0.038:0;
    let sy=0,sp=0;
    if (shake.sT>0){const s=shake.sT/0.12;sy+=(Math.random()-0.5)*shake.sS*s;sp+=(Math.random()-0.5)*shake.sS*s;shake.sT=Math.max(0,shake.sT-1/60);}
    if (shake.hT>0){const s=shake.hT/0.14;sy+=(Math.random()-0.5)*shake.hS*s;sp+=(Math.random()-0.5)*shake.hS*s;shake.hT=Math.max(0,shake.hT-1/60);}
    camera.position.set(player.x,CAM_Y+bob,player.z);
    camera.rotation.set(player.pitch+sp,player.yaw+sy,0,'YXZ');
  }

  // ── Shooting ─────────────────────────────────────────────────────────────────
  function shoot() {
    if (player.ammo<=0||player.health<=0||gameState!=='playing'||player.shootCd>0) return;
    player.ammo--;
    const T=player.gunTier;
    player.shootCd=[0.18,0.14,0.14,0.12,0.10][T];
    player.recoil=0.28;
    sfx.shoot();
    muzzleLight.intensity=2.2+T*0.6;
    sFlash.style.opacity='0.66'; setTimeout(()=>{sFlash.style.opacity='0';},55);
    shake.sT=0.12; shake.sS=0.06;
    // Ray spread offsets and damage per ray per tier
    const RAYS=[
      [{x:0,y:0}],
      [{x:0,y:0}],
      [{x:-0.07,y:0},{x:0,y:0},{x:0.07,y:0}],
      [{x:-0.07,y:0},{x:0,y:0},{x:0.07,y:0}],
      [{x:-0.10,y:0},{x:-0.05,y:0},{x:0,y:0},{x:0.05,y:0},{x:0.10,y:0}],
    ][T];
    const DMG=[1,2,1,2,1][T];
    const killed=new Set();
    for(const off of RAYS) {
      const ray=new THREE.Raycaster();
      ray.setFromCamera(off,camera);
      const hits=ray.intersectObjects(enemies.filter(e=>e.userData.alive&&!killed.has(e)),false);
      if(hits.length>0) {
        const e=hits[0].object, d=e.userData;
        d.hp-=DMG;
        if(!d.origColor) d.origColor=e.material.color.clone();
        e.material.color.setHex(0xffffff);
        setTimeout(()=>{if(d.origColor)e.material.color.copy(d.origColor);else e.material.color.setHex(0xffffff);},60);
        d.state='chase'; d.alertT=6;
        if(d.hp<=0) {
          killed.add(e);
          d.alive=false; d.dying=1.0;
          sfx.enemyDie();
          e.material.map=mkEnemyTex(d.type,true); e.material.needsUpdate=true;
          player.levelKills++; player.campaignKills++;
          if(Math.random()<0.25) {
            const amMesh=new THREE.Group();
            amMesh.add(new THREE.Mesh(new THREE.BoxGeometry(0.22,0.12,0.14),new THREE.MeshStandardMaterial({color:0x77aaee,emissive:0x0e2444,roughness:0.5,metalness:0.2})));
            amMesh.position.set(e.position.x,0.3,e.position.z); levelRoot.add(amMesh);
            pickups.push({type:'ammo',mesh:amMesh,baseY:0.3,ph:Math.random()*Math.PI*2,taken:false});
          }
          spawnGibs(e.position.clone());
        }
      }
    }
    updateHud();
  }

  // ── Weapon ───────────────────────────────────────────────────────────────────
  function updateWeapon(dt) {
    if (player.recoil>0) player.recoil=Math.max(0,player.recoil-dt*4.5);
    const bob=player.moving?Math.sin(player.bobPhase)*0.008:0;
    weaponEl.style.transform=`translateX(8%) translateY(${20+(bob+player.recoil)*100}px) scale(1.3) rotate(${player.recoil*3}deg)`;
  }

  // ── HUD ──────────────────────────────────────────────────────────────────────
  function updateHud() {
    hpValEl.textContent=player.health; amValEl.textContent=player.ammo;
    hpFill.style.width=player.health+'%';
    hpFill.style.background=player.health>50?'linear-gradient(90deg,#66cc77,#44bb55)':player.health>25?'linear-gradient(90deg,#ddaa33,#cc8822)':'linear-gradient(90deg,#ff5555,#ff3030)';
    amFill.style.width=(player.ammo/player.maxAmmo*100)+'%';
    killValEl.textContent=`Level ${currentLevel+1} \u2014 Kills ${player.levelKills}`;
    if (player.hasKey){keyStatus.textContent='KEY \u2713';keyStatus.className='have';}
    else{keyStatus.textContent='NO KEY';keyStatus.className='missing';}
    // Weapon glow scales with gun tier
    const tierGlow=['','drop-shadow(0 0 5px #44aaff)','drop-shadow(0 0 8px #22aaff)','drop-shadow(0 0 10px #00ccff) drop-shadow(0 0 16px #0044ff)','drop-shadow(0 0 12px #00ffff) drop-shadow(0 0 20px #0055ff)'][Math.min(player.gunTier,4)];
    weaponEl.style.filter=`drop-shadow(0 8px 18px rgba(0,0,0,0.6)) ${tierGlow}`;
    amValEl.textContent=player.gunTier>0?`${player.ammo} [T${player.gunTier}]`:player.ammo;
  }

  // ── Doom face ────────────────────────────────────────────────────────────────
  // ── Game state ───────────────────────────────────────────────────────────────
  function setGameState(ns, payload={}) {
    if (gameState===ns) return;
    gameState=ns;
    if (ns!=='playing'){gameActive=false;move.fwd=move.bck=move.lft=move.rgt=false;}
    if ((ns==='start'||ns==='gameover')&&document.pointerLockElement===renderer.domElement) document.exitPointerLock();
    if (ns==='playing'){gameActive=true;startPr.classList.add('hidden');stateOv.classList.add('hidden');return;}
    if (ns==='start'){startPr.classList.remove('hidden');stateOv.classList.add('hidden');statusEl.textContent=`Level ${currentLevel+1} — click to engage`;return;}
    startPr.classList.add('hidden'); stateOv.classList.remove('hidden'); stBtn.style.display='';
    if (ns==='level-complete'){
      stTitle.textContent=`Level ${currentLevel+1} Clear`;
      stStats.textContent=payload.stats||'';
      stBtn.style.display='none';
      statusEl.textContent='Preparing next level\u2026';
      return;
    }
    if (ns==='gameover'){
      sfx.gameOver();
      stTitle.textContent='You Died';
      stStats.textContent=`Reached Level: ${currentLevel+1}\nTotal Kills: ${player.campaignKills}\nKeep pushing — enemies grow\nhunger the deeper you go.`;
      stBtn.textContent='Play Again';
    }
  }

  function onLevelComplete() {
    if (gameState!=='playing') return;
    sfx.levelClear();
    setGameState('level-complete',{stats:`Kills: ${player.levelKills}\nAmmo left: ${player.ammo}\nLevel ${currentLevel+2} incoming\u2026`});
    advTimer=setTimeout(()=>{
      currentLevel++;
      loadLevel(currentLevel,true);
      setGameState('playing');
      if (renderer.domElement.requestPointerLock&&document.pointerLockElement!==renderer.domElement)
        try{renderer.domElement.requestPointerLock();}catch(_){}
    },3000);
  }

  // ── Controls ─────────────────────────────────────────────────────────────────
  function setKey(code,down) {
    if (code==='KeyW'||code==='ArrowUp')    move.bck=down;
    if (code==='KeyS'||code==='ArrowDown')  move.fwd=down;
    if (code==='KeyA'||code==='ArrowLeft')  move.lft=down;
    if (code==='KeyD'||code==='ArrowRight') move.rgt=down;
  }

  document.addEventListener('keydown',ev=>{
    setKey(ev.code,true);
    if (ev.code==='KeyE') eDown=true;
    if (ev.code==='Space'){ev.preventDefault();shoot();}
    if (ev.code==='KeyR'){ev.preventDefault();resetGame();}
  });
  document.addEventListener('keyup',ev=>{setKey(ev.code,false);if(ev.code==='KeyE')eDown=false;});
  document.addEventListener('mousemove',ev=>{
    if (document.pointerLockElement!==renderer.domElement) return;
    player.yaw-=ev.movementX*0.0025; player.pitch-=ev.movementY*0.0022;
    player.pitch=Math.max(-MAX_PITCH,Math.min(MAX_PITCH,player.pitch));
  });
  renderer.domElement.addEventListener('click',()=>{
    if (document.pointerLockElement!==renderer.domElement){lockPointer();return;}
    shoot();
  });
  startPr.addEventListener('click',lockPointer);
  startPr.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();lockPointer();}});
  stBtn.addEventListener('click',resetGame);

  // ── Pointer lock ─────────────────────────────────────────────────────────────
  let plFbT=null;
  function lockPointer() {
    if (gameState!=='start'&&gameState!=='playing') return;
    gameActive=true;          // force-activate before setGameState's early-return guard fires
    setGameState('playing'); startPr.classList.add('hidden'); statusEl.textContent='Engaging\u2026';
    initAudio();
    if (plFbT) clearTimeout(plFbT);
    plFbT=setTimeout(()=>{if(document.pointerLockElement!==renderer.domElement) statusEl.textContent='Pointer lock blocked \u2014 movement active, click canvas to fire.';},280);
    try{if(renderer.domElement.requestPointerLock){pendingLock=true;renderer.domElement.requestPointerLock();}}catch(_){pendingLock=false;}
  }

  document.addEventListener('pointerlockchange',()=>{
    const locked=document.pointerLockElement===renderer.domElement;
    if (locked){pendingLock=false;setGameState('playing');if(plFbT){clearTimeout(plFbT);plFbT=null;}return;}
    if (pendingLock) return;
    pendingLock=false;
    if (gameState==='playing'&&player.health>0){gameActive=false;move.fwd=move.bck=move.lft=move.rgt=false;eDown=false;startPr.classList.remove('hidden');statusEl.textContent='Click to resume';}
  });
  document.addEventListener('pointerlockerror',()=>{pendingLock=false;setGameState('playing');startPr.classList.add('hidden');});

  // ── Reset ────────────────────────────────────────────────────────────────────
  function resetGame() {
    if (advTimer){clearTimeout(advTimer);advTimer=null;}
    currentLevel=0; pendingLock=false;
    Object.assign(player,{x:1.5,z:1.5,yaw:0,pitch:0,health:100,ammo:24,hasKey:false,
      levelKills:0,campaignKills:0,recoil:0,bobPhase:0,shootCd:0,dmgTimer:0,moving:false,gunTier:0});
    muzzleLight.intensity=0; shake.sT=shake.hT=0;
    hFlash.style.opacity=sFlash.style.opacity=pkFlash.style.opacity='0';
    // Ensure overlays are in the right state before setting game state
    stateOv.classList.add('hidden');
    startPr.classList.remove('hidden');
    gameState='';  // force setGameState to not early-exit
    loadLevel(0,false); setGameState('start'); onResize(true); updateHud();
  }

  // ── Resize ───────────────────────────────────────────────────────────────────
  function onResize(force=false) {
    const w=Math.max(1,Math.floor(gc.clientWidth)), h=Math.max(1,Math.floor(gc.clientHeight));
    if (!force&&w===lastVW&&h===lastVH) return;
    lastVW=w;lastVH=h;
    camera.aspect=w/h;camera.updateProjectionMatrix();
    renderer.setSize(Math.round(w/2.8),Math.round(h/2.8),false);
    renderer.domElement.style.width=w+'px';renderer.domElement.style.height=h+'px';
  }
  const ro=new ResizeObserver(()=>requestAnimationFrame(()=>onResize(true)));
  ro.observe(gc);

  // ── Main loop ────────────────────────────────────────────────────────────────
  function animate() {
    const dt=Math.min(clock.getDelta(),0.05);
    const elapsed=performance.now()*0.001;
    
    // FPS counter
    fpsFrames++;
    if(performance.now() - fpsLastTime >= 1000) {
      fpsCounter.textContent = `FPS: ${fpsFrames}`;
      fpsFrames = 0;
      fpsLastTime = performance.now();
    }
    
    if (player.shootCd>0) player.shootCd=Math.max(0,player.shootCd-dt);
    if (player.dmgTimer>0) player.dmgTimer=Math.max(0,player.dmgTimer-dt);
    if (muzzleLight.intensity>0) muzzleLight.intensity=Math.max(0,muzzleLight.intensity-dt*38);
    if (gameState==='playing'&&gameActive&&player.health>0) {
      updateMovement(dt); updateEnemies(dt); updatePickups(dt,elapsed); updateExit(elapsed);
      // Footstep sounds while moving
      if(player.moving){_stepAccum+=dt;if(_stepAccum>0.38){_stepAccum=0;sfx.footstep();}}
      else _stepAccum=0.2;
    }
    updateGibs(dt); updateCamera(); updateWeapon(dt); updateHud();
    torchAccum+=dt;
    if (torchAccum>=TORCH_DT) { updateTorches(elapsed,torchAccum); torchAccum=0; }
    frameTick=(frameTick+1)%20; if(frameTick===0) onResize(false);
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  mkWeapon();
  loadLevel(0,false);
  setGameState('start');
  onResize(true);
  updateHud();
  animate();

})();
</script>
</body>
