<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sector 93</title>
  <style>
    :root {
      --bg-0: #06080d;
      --bg-1: #10141d;
      --hud-bg: rgba(14, 17, 25, 0.88);
      --hud-border: rgba(145, 168, 212, 0.28);
      --hud-text: #dce8ff;
      --hud-accent: #dca75f;
      --danger: #ff756f;
      --ok: #8ef19f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 25%, #18253d 0%, var(--bg-1) 48%, var(--bg-0) 100%);
      color: var(--hud-text);
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #070b12;
      isolation: isolate;
      border: 1px solid rgba(110, 133, 178, 0.26);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(235, 245, 255, 0.9);
      box-shadow: 0 0 5px rgba(115, 178, 255, 0.5);
    }

    #crosshair::before {
      left: 9px;
      top: 2px;
      width: 2px;
      height: 16px;
    }

    #crosshair::after {
      left: 2px;
      top: 9px;
      width: 16px;
      height: 2px;
    }

    #hud {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 92px;
      padding: 10px 14px;
      background:
        linear-gradient(180deg, rgba(32, 38, 56, 0.15), rgba(14, 17, 25, 0.88) 38%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.035) 2px, transparent 2px, transparent 6px);
      border-top: 1px solid var(--hud-border);
      box-shadow: 0 -16px 22px rgba(0, 0, 0, 0.38);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 10px;
      pointer-events: none;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-size: 0.75rem;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55);
    }

    .hud-block strong {
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      color: #f2f7ff;
    }

    .hud-center {
      text-align: center;
      padding-bottom: 4px;
      min-width: 180px;
    }

    #statusText {
      font-size: 0.67rem;
      color: #afc6f3;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .meter-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      font-size: 0.66rem;
      margin-top: 2px;
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      border: 1px solid rgba(177, 197, 232, 0.32);
      background: rgba(10, 14, 20, 0.84);
      overflow: hidden;
      min-width: 92px;
    }

    .meter > span {
      display: block;
      height: 100%;
      width: 50%;
      transition: width 120ms linear;
    }

    #healthBar > span {
      background: linear-gradient(90deg, #ff8b6e, #ff5d58);
    }

    #ammoBar > span {
      background: linear-gradient(90deg, #9fd1ff, #67a9ff);
    }

    #weapon {
      position: absolute;
      left: 50%;
      bottom: 74px;
      width: min(44vw, 330px);
      transform: translateX(-50%);
      transform-origin: center bottom;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.55));
      pointer-events: none;
      image-rendering: pixelated;
    }

    #screenFlash {
      position: absolute;
      inset: 0;
      background: rgba(255, 247, 212, 0.65);
      opacity: 0;
      transition: opacity 75ms linear;
      pointer-events: none;
    }

    #hitFlash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 70, 58, 0) 42%, rgba(255, 70, 58, 0.3) 100%);
      opacity: 0;
      transition: opacity 80ms linear;
      pointer-events: none;
    }

    #pickupFlash {
      position: absolute;
      inset: 0;
      background: rgba(118, 241, 173, 0.26);
      opacity: 0;
      transition: opacity 120ms linear;
      pointer-events: none;
    }

    #startPrompt {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(6, 9, 15, 0.48), rgba(6, 9, 15, 0.86));
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 140ms ease;
      padding: 22px;
      z-index: 4;
    }

    #startPrompt.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #stateOverlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(3, 4, 7, 0.35), rgba(3, 4, 7, 0.85));
      text-align: center;
      pointer-events: auto;
      transition: opacity 140ms ease;
      padding: 22px;
      z-index: 5;
    }

    #stateOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #stateOverlay .prompt-card {
      max-width: 520px;
      border: 1px solid rgba(195, 214, 248, 0.28);
      border-radius: 14px;
      padding: 16px 18px;
      background: linear-gradient(180deg, rgba(24, 31, 44, 0.9), rgba(11, 16, 26, 0.95));
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.42);
    }

    #stateTitle {
      margin: 0 0 8px;
      font-size: clamp(1.12rem, 2.5vw, 1.62rem);
      color: #f4e4c6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #stateStats {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #d3e1ff;
      white-space: pre-line;
    }

    #stateAction {
      margin-top: 14px;
      border: 1px solid rgba(186, 206, 244, 0.4);
      border-radius: 10px;
      padding: 9px 16px;
      background: linear-gradient(180deg, rgba(80, 101, 139, 0.65), rgba(39, 54, 81, 0.82));
      color: #f3f7ff;
      font-family: inherit;
      font-size: 0.84rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    #startPrompt .prompt-card {
      max-width: 500px;
      border: 1px solid rgba(195, 214, 248, 0.28);
      border-radius: 14px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(24, 31, 44, 0.85), rgba(11, 16, 26, 0.93));
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.42);
    }

    #startPrompt h1 {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      color: #f4e4c6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #startPrompt p {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.45;
      color: #d3e1ff;
    }

    @media (max-width: 780px) {
      #game-container {
        min-height: 460px;
      }

      #hud {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .hud-center {
        order: 3;
        grid-column: 1 / -1;
      }

      #weapon {
        width: min(52vw, 280px);
        bottom: 96px;
      }
    }

    #doom-face-canvas {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      border: 2px solid rgba(145, 168, 212, 0.4);
      border-radius: 4px;
      margin: 0 auto 4px;
      display: block;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
    }
  </style>
</head>

      <div id="hud" role="status" aria-live="polite">

          <div class="meter-row">
            <span>Life</span>
            <div id="healthBar" class="meter"><span></span></div>
          </div>
        </div>
        <div class="hud-center hud-block">
          <canvas id="doom-face-canvas" width="32" height="32" aria-label="Player status face"></canvas>
          <span id="statusText">Click to lock pointer and begin</span>
          <strong id="killValue">Kills 0 / 3</strong>
        </div>
        <div class="hud-block" style="text-align:right; align-items:flex-end;">
          <span>Ammo</span>
          <strong id="ammoValue">24</strong>
          <div class="meter-row" style="grid-template-columns:1fr auto; width:min(180px, 100%);">
            <div id="ammoBar" class="meter"><span></span></div>
            <span>Clip</span>
          </div>
        </div>
      </div>
    </div>
    <div id="startPrompt" role="button" tabindex="0" aria-label="Start game and lock pointer">
      <div class="prompt-card">
        <h1>Sector 93</h1>
        <p>Click to engage pointer lock.<br>Move: WASD or Arrows, Look: Mouse, Fire: Left Click or Space.</p>
      </div>
    </div>
    <div id="stateOverlay" class="hidden" aria-live="polite">
      <div class="prompt-card">
        <h2 id="stateTitle">Level Clear</h2>
        <p id="stateStats"></p>
        <button id="stateAction" type="button">Play Again</button>
      </div>
    </div>
  </div>

      function createStoneTexture() {
        const c = document.createElement('canvas');
        c.width = 128;
        c.height = 128;
        const ctx = c.getContext('2d');

        ctx.fillStyle = '#3c414b';
        ctx.fillRect(0, 0, 128, 128);

        for (let y = 0; y < 128; y += 16) {
          for (let x = 0; x < 128; x += 32) {
            const offset = ((y / 16) % 2) * 16;
            const sx = (x + offset) % 128;
            const v = 54 + Math.floor(Math.random() * 26);
            ctx.fillStyle = `rgb(${v}, ${v + 2}, ${v + 7})`;
            ctx.fillRect(sx + 1, y + 1, 30, 14);
          }
        }

        ctx.strokeStyle = 'rgba(14, 16, 20, 0.9)';
        ctx.lineWidth = 2;
        for (let y = 0; y <= 128; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(128, y);
          ctx.stroke();
        }
        for (let y = 0; y < 128; y += 16) {
          const offset = ((y / 16) % 2) * 16;
          for (let x = 0; x <= 128; x += 32) {
            const vx = (x + offset) % 128;
            ctx.beginPath();
            ctx.moveTo(vx, y);
            ctx.lineTo(vx, y + 16);
            ctx.stroke();
          }
        }

        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        return tex;
      }

      function createCobblestoneFloorTexture() {
        const c = document.createElement('canvas');
        c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#1a1410';
        ctx.fillRect(0, 0, 128, 128);
        const cols = 8, rows = 8;
        const bw = 128 / cols, bh = 128 / rows;
        // deterministic seeded random via sin hashing — no side-effects on Math.random
        function sr(seed) { const x = Math.sin(seed + 1) * 43758.5453123; return x - Math.floor(x); }
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const seed = col * 31 + row * 97;
            const ox = (row % 2 === 0) ? 0 : bw * 0.5;
            const x = col * bw + ox, y = row * bh;
            const L = 12 + Math.floor(sr(seed) * 10);
            const H = 25 + Math.floor(sr(seed * 13) * 15);
            ctx.fillStyle = `hsl(${H},18%,${L}%)`;
            ctx.beginPath();
            const p = 2, r = 3;
            ctx.moveTo(x+p+r, y+p); ctx.lineTo(x+bw-p-r, y+p);
            ctx.arcTo(x+bw-p, y+p, x+bw-p, y+p+r, r);
            ctx.lineTo(x+bw-p, y+bh-p-r);
            ctx.arcTo(x+bw-p, y+bh-p, x+bw-p-r, y+bh-p, r);
            ctx.lineTo(x+p+r, y+bh-p);
            ctx.arcTo(x+p, y+bh-p, x+p, y+bh-p-r, r);
            ctx.lineTo(x+p, y+p+r);
            ctx.arcTo(x+p, y+p, x+p+r, y+p, r);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = `hsl(${H},12%,${L+6}%)`;
            ctx.lineWidth = 1; ctx.stroke();
            if (sr(col * 7 + row * 23 + 5) > 0.6) {
              ctx.fillStyle = 'rgba(30,55,20,0.4)';
              const mx = x+p + sr(col+row*3)*(bw-20);
              const my = y+p + sr(col*3+row)*(bh-10);
              ctx.beginPath();
              ctx.ellipse(mx, my, 6, 4, sr(col+row)*Math.PI, 0, Math.PI*2);
              ctx.fill();
            }
          }
        }
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 4);
        return tex;
      }

      function createBeamCeilingTexture() {
        const c = document.createElement('canvas');
        c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#080608';
        ctx.fillRect(0, 0, 128, 128);
        function sr(seed) { const x = Math.sin(seed + 1) * 43758.5453123; return x - Math.floor(x); }
        const beamCount = 6;
        const bh = 128 / beamCount;
        for (let i = 0; i < beamCount; i++) {
          const y = i * bh;
          const L = 6 + Math.floor(sr(i * 37) * 5);
          ctx.fillStyle = `hsl(20,15%,${L}%)`;
          ctx.fillRect(0, y + 2, 128, bh - 4);
          ctx.strokeStyle = `hsl(20,10%,${Math.max(1, L - 3)}%)`;
          ctx.lineWidth = 1;
          for (let g = 0; g < 5; g++) {
            const gx = sr(i * 7 + g * 13) * 128;
            ctx.beginPath(); ctx.moveTo(gx, y+2); ctx.lineTo(gx+20, y+bh-4); ctx.stroke();
          }
          ctx.fillStyle = 'rgba(0,0,0,0.8)';
          ctx.fillRect(0, y, 128, 2);
        }
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(6, 6);
        return tex;

      // Euler gravity integration: vy -= g*dt, pos += v*dt each frame
      function updateGibs(dt) {
        for (let i = _activeGibs.length - 1; i >= 0; i--) {
          const g = _activeGibs[i];
          g.life -= dt;
          if (g.life <= 0 || g.mesh.position.y < -0.1) {
            if (g.mesh.parent) g.mesh.parent.remove(g.mesh);
            g.mesh.geometry.dispose();
            g.mesh.material.dispose();
            _activeGibs.splice(i, 1);
            continue;
          }
          g.vy -= 18 * dt;
          g.mesh.position.x += g.vx * dt;
          g.mesh.position.y += g.vy * dt;
          g.mesh.position.z += g.vz * dt;
          g.mesh.lookAt(camera.position);
          if (g.life < 0.3) g.mesh.material.opacity = g.life / 0.3;
        }
      }

      function isEnemySpawnClear(x, z, occupiedSpawns) {
        if (!occupiedSpawns || occupiedSpawns.length === 0) return true;
        return occupiedSpawns.every((point) => Math.hypot(point.x - x, point.z - z) >= 0.7);
      }

      function findEnemySafeSpawn(x, z, occupiedSpawns = []) {
        const enemyRadius = 0.26;
        if (canMoveTo(x, z, enemyRadius) && isEnemySpawnClear(x, z, occupiedSpawns)) return { x, z };

        // Spiral search to snap invalid spawn points to nearby open space.
        for (let radius = 0.08; radius <= 3; radius += 0.08) {
          for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 20) {
            const nx = x + Math.cos(angle) * radius;
            const nz = z + Math.sin(angle) * radius;
            if (canMoveTo(nx, nz, enemyRadius) && isEnemySpawnClear(nx, nz, occupiedSpawns)) {
              return { x: nx, z: nz };
            }
          }
        }

        // Final fallback for safety.
        return { x: player.x, z: player.z };
      }

      function isWallAt(x, z) {
        const tx = Math.floor(x);
        const tz = Math.floor(z);
        if (tx < 0 || tz < 0 || tx >= worldW || tz >= worldH) return true;
        return isWallCellValue(currentMap[tz][tx]);
      }

      function canMoveTo(x, z, radius) {
        const probes = [
          [x - radius, z - radius],
          [x + radius, z - radius],
          [x - radius, z + radius],
          [x + radius, z + radius],
          [x, z - radius],
          [x, z + radius],
          [x - radius, z],
          [x + radius, z]
        ];
        return probes.every((p) => !isWallAt(p[0], p[1]));
      }

      function updateMovement(dt) {
        let moveX = 0;
        let moveZ = 0;
        const inputActive = move.forward || move.backward || move.left || move.right;
        player.moving = inputActive;

        const cosYaw = Math.cos(player.yaw);
        const sinYaw = Math.sin(player.yaw);

        if (move.forward) {
          moveX += sinYaw;
          moveZ += cosYaw;
        }
        if (move.backward) {
          moveX -= sinYaw;
          moveZ -= cosYaw;
        }
        if (move.left) {
          moveX += Math.sin(player.yaw - Math.PI / 2);
          moveZ += Math.cos(player.yaw - Math.PI / 2);
        }
        if (move.right) {
          moveX += Math.sin(player.yaw + Math.PI / 2);
          moveZ += Math.cos(player.yaw + Math.PI / 2);
        }

        const len = Math.hypot(moveX, moveZ);
        if (len > 0.001) {
          moveX /= len;
          moveZ /= len;

          const nx = player.x + moveX * player.speed * dt;
          const nz = player.z + moveZ * player.speed * dt;

          if (canMoveTo(nx, player.z, player.radius)) player.x = nx;
          if (canMoveTo(player.x, nz, player.radius)) player.z = nz;

          player.bobPhase += dt * 8;
        }
      }

      function collectWallTorchAnchors() {
        const anchors = [];
        const usedFaces = new Set();
        const directions = [
          { dx: 1, dz: 0 },
          { dx: -1, dz: 0 },
          { dx: 0, dz: 1 },
          { dx: 0, dz: -1 }
        ];

        for (let z = 1; z < worldH - 1; z += 1) {
          for (let x = 1; x < worldW - 1; x += 1) {
            const cell = cellAt(x, z);
            if (!isWallCellValue(cell)) continue;
            if ((x + z) % 2 !== 0) continue;

            directions.forEach((dir) => {
              const openX = x + dir.dx;
              const openZ = z + dir.dz;
              if (!isOpenCell(openX, openZ)) return;

              const key = `${x},${z},${dir.dx},${dir.dz}`;
              if (usedFaces.has(key)) return;
              usedFaces.add(key);
              anchors.push({ wallX: x, wallZ: z, nx: dir.dx, nz: dir.dz });
            });
          }
        }

        return anchors.slice(0, MAX_TORCHES);
      }

      function addDustField(cx, cz, radius = 2.8, count = 36) {
        const positions = new Float32Array(count * 3);
        const base = new Float32Array(count * 3);
        for (let i = 0; i < count; i += 1) {
          const a = Math.random() * Math.PI * 2;
          const r = Math.random() * radius;
          const px = cx + Math.cos(a) * r;
          const py = 0.22 + Math.random() * 1.35;
          const pz = cz + Math.sin(a) * r;
          const idx = i * 3;
          positions[idx] = px;
          positions[idx + 1] = py;
          positions[idx + 2] = pz;
          base[idx] = px;
          base[idx + 1] = py;
          base[idx + 2] = pz;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
          color: 0xd5d9e4,
          size: 0.045,
          transparent: true,
          opacity: 0.22,
          depthWrite: false
        });
        const points = new THREE.Points(geo, mat);
        levelRoot.add(points);
        dustFields.push({
          points,
          base,
          centerX: cx,
          centerZ: cz,
          radius,
          phase: Math.random() * Math.PI * 2,
          sway: 0.08 + Math.random() * 0.07,
          rise: 0.012 + Math.random() * 0.01
        });
      }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({

          size: 0.065,
          transparent: true,
          opacity: 0,
          depthWrite: false
        });
        const points = new THREE.Points(geo, mat);
        levelRoot.add(points);
        emberGustZones.push({
          points,
          velocity,
          centerX: cx,
          centerZ: cz,
          count,
          active: 0,
          burstMin,
          burstMax,
          nextBurst: burstMin + Math.random() * Math.max(0.1, (burstMax - burstMin))
        });
      }

      function triggerEmberGust(zone) {
        const pos = zone.points.geometry.attributes.position.array;
        for (let i = 0; i < zone.count; i += 1) {
          const idx = i * 3;
          pos[idx] = zone.centerX + (Math.random() - 0.5) * 0.45;
          pos[idx + 1] = 0.42 + Math.random() * 0.08;
          pos[idx + 2] = zone.centerZ + (Math.random() - 0.5) * 0.45;
          zone.velocity[idx] = (Math.random() - 0.5) * 0.15;
          zone.velocity[idx + 1] = 0.35 + Math.random() * 0.35;
          zone.velocity[idx + 2] = (Math.random() - 0.5) * 0.15;
        }
        zone.points.geometry.attributes.position.needsUpdate = true;
        zone.active = 1.25;
      }

      function updateAtmosphere(dt, elapsed) {
        shadowSilhouettes.forEach((sil) => {
          const sway = Math.sin(elapsed * sil.speed + sil.phase) * sil.drift;
          sil.mesh.position.x = sil.homeX + sway;
          sil.mesh.position.y = sil.homeY + Math.sin(elapsed * (sil.speed * 0.6) + sil.phase) * 0.06;
          sil.mesh.position.z = sil.homeZ;
          const blinkFactor = 0.52 + Math.sin(elapsed * 2.1 + sil.blink) * 0.48;
          sil.mesh.material.opacity = 0.06 + blinkFactor * 0.22;
          sil.mesh.rotation.y = Math.sin(elapsed * sil.speed + sil.phase * 1.4) * 0.2;
        });

        dustFields.forEach((field) => {
          const attr = field.points.geometry.attributes.position;
          const pos = attr.array;
          const base = field.base;
          for (let i = 0; i < pos.length; i += 3) {
            const seed = i * 0.017 + field.phase;
            pos[i] = base[i] + Math.sin(elapsed * 0.42 + seed) * field.sway;
            pos[i + 1] = base[i + 1] + Math.sin(elapsed * 0.26 + seed * 1.3) * field.rise;
            pos[i + 2] = base[i + 2] + Math.cos(elapsed * 0.38 + seed) * field.sway;
          }
          attr.needsUpdate = true;
        });

        emberGustZones.forEach((zone) => {
          zone.nextBurst -= dt;
          if (zone.active <= 0 && zone.nextBurst <= 0) {
            triggerEmberGust(zone);
            zone.nextBurst = zone.burstMin + Math.random() * Math.max(0.1, (zone.burstMax - zone.burstMin));
          }

          if (zone.active > 0) {
            zone.active = Math.max(0, zone.active - dt);
            const life = zone.active / 1.25;
            const attr = zone.points.geometry.attributes.position;
            const pos = attr.array;
            for (let i = 0; i < pos.length; i += 3) {
              pos[i] += zone.velocity[i] * dt;
              pos[i + 1] += zone.velocity[i + 1] * dt;
              pos[i + 2] += zone.velocity[i + 2] * dt;
            }
            attr.needsUpdate = true;
            zone.points.material.opacity = life * 0.85;
          } else {
            zone.points.material.opacity = 0;
          }
        });

        thunderState.nextAt -= dt;
        if (thunderState.timer <= 0 && thunderState.nextAt <= 0 && stainedGlassBeams.length > 0) {
          const picked = stainedGlassBeams[Math.floor(Math.random() * stainedGlassBeams.length)];
          thunderState.color.copy(picked.color);
          thunderState.timer = 0.26;
          thunderState.nextAt = 9 + Math.random() * 13;
          thunderRumble.timer = 0.48;
          thunderRumble.strength = 0.032 + Math.random() * 0.018;
        }

        if (thunderState.timer > 0) {
          thunderState.timer = Math.max(0, thunderState.timer - dt);
          const t = thunderState.timer / 0.26;
          const pulse = 0.35 + Math.sin((1 - t) * 40) * 0.15;
          ambientLight.intensity = 0.22 + pulse * t;
          keyLight.intensity = 0.34 + pulse * t * 1.2;
          fillLight.intensity = 0.2 + pulse * t * 0.85;
          scene.background.setRGB(0.01 + thunderState.color.r * t * 0.15, 0.01 + thunderState.color.g * t * 0.15, 0.01 + thunderState.color.b * t * 0.15);
          scene.fog.color.copy(scene.background);
        } else {
          ambientLight.intensity = 0.22;
          keyLight.intensity = 0.34;
          fillLight.intensity = 0.2;
          scene.background.set(0x000000);
          scene.fog.color.set(0x000000);
        }
      }

      function addTorches() {
        const anchors = collectWallTorchAnchors();
        const wallOffset = wallSize * 0.5 - 0.03;
        const backOffset = 0.16;
        const torchPlateGeo = new THREE.BoxGeometry(0.28, 0.34, 0.05);
        const torchArmGeo = new THREE.BoxGeometry(0.075, 0.075, 0.24);
        const torchBowlGeo = new THREE.SphereGeometry(0.11, 12, 12, 0, Math.PI * 2, 0, Math.PI * 0.62);
        const torchMat = new THREE.MeshStandardMaterial({ color: 0x4b3a2b, roughness: 0.82, metalness: 0.22 });
        const flameGeo = new THREE.SphereGeometry(0.1, 10, 10);
        const flameMat = new THREE.MeshBasicMaterial({ color: 0xffbf6d });
        const emberGeo = new THREE.SphereGeometry(0.014, 6, 6);

        anchors.forEach((anchor, index) => {
          const cx = anchor.wallX + 0.5;
          const cz = anchor.wallZ + 0.5;
          const faceX = cx + anchor.nx * wallOffset;
          const faceZ = cz + anchor.nz * wallOffset;
          const yaw = Math.atan2(anchor.nx, anchor.nz);

          const holder = new THREE.Group();
          const plate = new THREE.Mesh(torchPlateGeo, torchMat);
          plate.position.set(faceX - anchor.nx * 0.015, 0.98, faceZ - anchor.nz * 0.015);
          plate.rotation.y = yaw;
          freezeMeshTransform(plate);
          holder.add(plate);

          const arm = new THREE.Mesh(torchArmGeo, torchMat);
          arm.position.set(faceX + anchor.nx * (backOffset * 0.53), 0.89, faceZ + anchor.nz * (backOffset * 0.53));
          arm.rotation.y = yaw;
          freezeMeshTransform(arm);
          holder.add(arm);

          const bowl = new THREE.Mesh(torchBowlGeo, torchMat);
          bowl.position.set(faceX + anchor.nx * backOffset, 0.84, faceZ + anchor.nz * backOffset);
          bowl.rotation.set(Math.PI, yaw, 0);
          freezeMeshTransform(bowl);
          holder.add(bowl);

          const flame = new THREE.Mesh(flameGeo, flameMat);
          flame.position.set(faceX + anchor.nx * backOffset, 0.98, faceZ + anchor.nz * backOffset);
          holder.add(flame);

          let light = null;
          if (index % TORCH_LIGHT_STRIDE === 0) {
            light = new THREE.PointLight(0xffa85b, 1.55, 11.8, 1.65);
            light.position.set(faceX + anchor.nx * backOffset, 0.99, faceZ + anchor.nz * backOffset);
            holder.add(light);
          }

          const embers = [];
          for (let i = 0; i < TORCH_EMBERS_PER; i += 1) {
            const ember = new THREE.Mesh(
              emberGeo,
              new THREE.MeshBasicMaterial({
                color: i % 2 === 0 ? 0xffc578 : 0xff8f4b,
                transparent: true,
                opacity: 0.8
              })
            );
            ember.position.copy(flame.position);
            ember.visible = false;
            holder.add(ember);
            const emberState = {
              mesh: ember,
              baseX: flame.position.x,
              baseY: flame.position.y,
              baseZ: flame.position.z,
              phase: Math.random() * Math.PI * 2,
              age: Math.random(),
              life: 0.75 + Math.random() * 0.6,
              lateral: 0.03 + Math.random() * 0.05,
              rise: 0.26 + Math.random() * 0.22
            };
            embers.push(emberState);
            torchEmbers.push(emberState);
          }

          torchLights.push({
            light,
            flame,
            embers,
            baseIntensity: 1.34,
            phase: index * 1.11,
            pulse: 0.065 + (index % 4) * 0.012
          });

          levelRoot.add(holder);
        });
      }

      function updateSecretWalls(dt) {
        for (const sw of secretWalls) {
          if (sw.state === 'open') continue;
          const dist = Math.hypot(player.x - sw.worldX, player.z - sw.worldZ);
          if (sw.state === 'closed') {
            // Subtle emissive hint when player is nearby
            if (sw.mesh.material.emissive) {
              sw.mesh.material.emissiveIntensity = Math.max(0, (1 - dist / 3)) * 0.28;
            }
            // Trigger on E key press within 2 units
            if (eKeyDown && dist < 2.0) {
              sw.state = 'opening';
              currentMap[sw.z][sw.x] = 0; // open collision
              statusTextEl.textContent = '\u26a0 Secret passage discovered!';
            }
          }
          if (sw.state === 'opening') {
            sw.mesh.position.y -= 3.5 * dt;
            if (sw.mesh.position.y < -wallHeight) {
              sw.mesh.visible = false;
              sw.state = 'open';
            }
          }
        }
      }

      function updateTorches(timeSec, simDt = 0.016) {
        torchLights.forEach((torch) => {
          const flicker = Math.sin(timeSec * 7.5 + torch.phase) * torch.pulse
            + Math.sin(timeSec * 15.2 + torch.phase * 1.9) * (torch.pulse * 0.45);
          const intensity = Math.max(0.22, torch.baseIntensity + flicker);
          if (torch.light) torch.light.intensity = intensity;
          const scale = 0.82 + (intensity * 0.42);
          torch.flame.scale.set(scale, scale + 0.12, scale);

          torch.embers.forEach((ember) => {
            ember.age += simDt;
            const t = ember.age / ember.life;
            if (t >= 1) {
              ember.age = 0;
              ember.life = 0.75 + Math.random() * 0.6;
              ember.phase = Math.random() * Math.PI * 2;
              ember.lateral = 0.03 + Math.random() * 0.05;
              ember.rise = 0.26 + Math.random() * 0.22;
            }

            const cycle = ember.age / ember.life;
            const driftX = Math.sin(timeSec * 4.8 + ember.phase) * ember.lateral * cycle;
            const driftZ = Math.cos(timeSec * 4.1 + ember.phase) * ember.lateral * cycle;
            ember.mesh.position.set(
              ember.baseX + driftX,
              ember.baseY + cycle * ember.rise,
              ember.baseZ + driftZ
            );
            ember.mesh.visible = true;
            ember.mesh.material.opacity = Math.max(0, 0.85 * (1 - cycle));
            const emberScale = 0.7 + (1 - cycle) * 0.6;
            ember.mesh.scale.setScalar(emberScale);
          });
        });

        fireplaceLights.forEach((fire) => {
          const flicker = Math.sin(timeSec * 8.8 + fire.phase) * fire.pulse
            + Math.sin(timeSec * 18.4 + fire.phase * 1.7) * (fire.pulse * 0.42);
          const intensity = Math.max(0.5, fire.baseIntensity + flicker);
          fire.light.intensity = intensity;
          const fScale = 0.85 + intensity * 0.18;
          fire.flame.scale.set(fScale * 0.9, fScale * 1.12, fScale * 0.9);
          fire.flame.material.opacity = Math.min(0.98, 0.72 + intensity * 0.17);
        });
      }

      function createLevelPortal(exitX, exitZ) {
        const group = new THREE.Group();
        const leftPillar = new THREE.Mesh(
          new THREE.BoxGeometry(0.28, 1.65, 0.28),
          new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.95, metalness: 0.02 })
        );
        leftPillar.position.set(-0.34, 0.82, 0);
        const rightPillar = leftPillar.clone();
        rightPillar.position.x = 0.34;
        const lintel = new THREE.Mesh(
          new THREE.BoxGeometry(0.98, 0.24, 0.28),
          new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.95, metalness: 0.02 })
        );
        lintel.position.set(0, 1.56, 0);

        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.29, 0.08, 10, 18),
          new THREE.MeshStandardMaterial({ color: 0xbf2f2f, emissive: 0x6b1010, emissiveIntensity: 1.15, roughness: 0.52, metalness: 0.2 })
        );
        ring.position.set(0, 0.95, 0);
        ring.rotation.x = Math.PI / 2;

        const glow = new THREE.Mesh(
          new THREE.CircleGeometry(0.2, 20),
          new THREE.MeshBasicMaterial({ color: 0xff4a3d, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
        );
        glow.position.set(0, 0.95, 0.02);

        const light = new THREE.PointLight(0xff5a45, 0.7, 6.6, 1.8);
        light.position.set(0, 1.02, 0);

        group.add(leftPillar, rightPillar, lintel, ring, glow, light);
        group.position.set(exitX, 0, exitZ);
        levelRoot.add(group);

        levelExit.x = exitX;
        levelExit.z = exitZ;
        levelExit.group = group;
        levelExit.glow = glow;
        levelExit.pulseSeed = Math.random() * Math.PI * 2;
      }

      function unlockAllGates() {
        gates.forEach((gate) => {
          if (gate.opened) return;
          gate.opened = true;
          currentMap[gate.z][gate.x] = 0;
          gate.mesh.visible = false;
          if (gate.mesh.parent) gate.mesh.parent.remove(gate.mesh);
        });
        statusTextEl.textContent = 'Gate unlocked. Path to Point B opened.';
      }

      function buildEncounterBeatPlan(level) {
        const beats = Array.isArray(level.beats) ? level.beats : [];
        const plan = {
          enemies: [],
          pickups: [],
          setPieces: [],
          objective: 'reach Point B.'
        };

        if (beats.length === 0) return plan;

        beats.forEach((beat) => {
          if (Array.isArray(beat.enemies)) plan.enemies.push(...beat.enemies);
          if (Array.isArray(beat.pickups)) plan.pickups.push(...beat.pickups);
          if (Array.isArray(beat.setPieces)) plan.setPieces.push(...beat.setPieces);
        });

        plan.objective = `${beats[0].name} -> ${beats[beats.length - 1].name}`;
        return plan;
      }

      function loadLevel(levelIndex, options = {}) {
        const preserveStats = Boolean(options.preserveStats);
        const level = LEVELS[levelIndex];
        clearLevelScene();
        const beatPlan = buildEncounterBeatPlan(level);

        currentMap = level.map.map((row) => row.slice());
        sealLevelBorders(currentMap);
        worldH = currentMap.length;
        worldW = currentMap[0].length;

        const floor = new THREE.Mesh(
          new THREE.PlaneGeometry(worldW, worldH),
          new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 1, metalness: 0 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(worldW / 2, 0, worldH / 2);
        levelRoot.add(floor);
        floorMesh = floor;

        const ceiling = new THREE.Mesh(
          new THREE.PlaneGeometry(worldW, worldH),
          new THREE.MeshStandardMaterial({ map: ceilTexture, roughness: 1, metalness: 0.02, side: THREE.BackSide })
        );
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(worldW / 2, wallHeight, worldH / 2);
        levelRoot.add(ceiling);
        ceilingMesh = ceiling;

        const wallGeo = new THREE.BoxGeometry(wallSize, wallHeight, wallSize);
        const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.95, metalness: 0.02 });
        const gateMat = new THREE.MeshStandardMaterial({ color: 0x4f545f, emissive: 0x11151d, roughness: 0.46, metalness: 0.66 });

        let spawnX = 1.5;
        let spawnZ = 1.5;
        let exitX = worldW - 1.5;
        let exitZ = worldH - 1.5;
        const enemySpawns = [];
        const pickupSpawns = [];
        const solidWallPositions = []; // collected for InstancedMesh

        for (let z = 0; z < worldH; z += 1) {
          for (let x = 0; x < worldW; x += 1) {
            const value = currentMap[z][x];
            const px = x + 0.5;
            const pz = z + 0.5;

            if (value === 1) {
              solidWallPositions.push({ px, pz }); // batched into InstancedMesh below
            }

            if (value === 8) {
              // Secret wall: identical look to stone but slides into floor on E key
              const sw = new THREE.Mesh(wallGeo, wallMat.clone());
              sw.position.set(px, wallHeight / 2, pz);
              levelRoot.add(sw);
              secretWalls.push({ x, z, mesh: sw, state: 'closed', worldX: px, worldZ: pz });
            }

            if (value === 7) {
              const gate = new THREE.Mesh(new THREE.BoxGeometry(0.92, 1.7, 0.18), gateMat);
              gate.position.set(px, 0.85, pz);
              freezeMeshTransform(gate);
              levelRoot.add(gate);
              gates.push({ x, z, mesh: gate, opened: false });
            }

            if (value === 2) {
              spawnX = px;
              spawnZ = pz;
            }

            if (value === 3) {
              exitX = px;
              exitZ = pz;
            }

            if (value === 4) {
              enemySpawns.push({
                x: px,
                z: pz,
                wanderSeed: Math.random() * Math.PI * 2,
                type: enemySpawns.length % 2 === 0 ? 'monster' : 'dragon'
              });
            }

            if (value === 5) {
              pickupSpawns.push({ type: pickupSpawns.length % 2 === 0 ? 'medkit' : 'ammo', x: px, z: pz });
            }

            if (value === 6) {
              pickupSpawns.push({ type: 'key', x: px, z: pz });
            }
          }
        }

        // Single draw call for all solid walls via InstancedMesh
        if (solidWallPositions.length > 0) {
          const iWalls = new THREE.InstancedMesh(wallGeo, wallMat, solidWallPositions.length);
          const _im4 = new THREE.Matrix4();
          solidWallPositions.forEach((pos, i) => {
            _im4.makeTranslation(pos.px, wallHeight / 2, pos.pz);
            iWalls.setMatrixAt(i, _im4);
          });
          iWalls.instanceMatrix.needsUpdate = true;
          iWalls.name = 'WALLS_INSTANCED';
          levelRoot.add(iWalls);
        }

        enemySpawns.push(...beatPlan.enemies.map((enemy, idx) => ({
          x: enemy.x,
          z: enemy.z,
          wanderSeed: (enemy.wanderSeed != null) ? enemy.wanderSeed : ((idx + 1) * 0.73),
          type: enemy.type || (idx % 2 === 0 ? 'monster' : 'dragon')
        })));

        pickupSpawns.push(...beatPlan.pickups.map((pickup) => ({
          type: pickup.type,
          x: pickup.x,
          z: pickup.z
        })));

        addTorches();
        addFireplaces(level.fireplaces || []);
        addArchitecturalSetPieces([...(level.setPieces || []), ...beatPlan.setPieces]);
        const dustPlan = (level.atmosphere && level.atmosphere.dust) ? level.atmosphere.dust : [];
        dustPlan.forEach((zone) => addDustField(zone.x, zone.z, zone.radius || 2.6, zone.count || 28));
        spawnEnemies(enemySpawns);
        createPickups(pickupSpawns);
        createLevelPortal(exitX, exitZ);

        player.x = spawnX;
        player.z = spawnZ;
        player.pitch = 0;
        player.yaw = 0;
        player.levelKills = 0;
        player.hasKey = false;

        if (!preserveStats) {
          player.health = 100;
          player.ammo = player.maxAmmo;
          player.campaignKills = 0;
        }

        statusTextEl.textContent = `${level.name}: ${beatPlan.objective}`;
        updateCamera();
        updateHud();
      }

      function hasLineOfSight(fromX, fromZ, toX, toZ) {
        const dx = toX - fromX;
        const dz = toZ - fromZ;
        const dist = Math.hypot(dx, dz);
        if (dist < 0.001) return true;
        const steps = Math.max(2, Math.ceil(dist / 0.15));
        for (let i = 1; i < steps; i += 1) {
          const t = i / steps;
          const sx = fromX + dx * t;
          const sz = fromZ + dz * t;
          if (isWallAt(sx, sz)) return false;
        }
        return true;
      }

      function updateCamera() {
        let shakeX = 0;
        let shakeY = 0;
        let shakeZ = 0;
        let shakeYaw = 0;
        let shakePitch = 0;

        if (screenShake.shootTimer > 0) {
          const k = screenShake.shootTimer / 0.08;
          const strength = screenShake.shootStrength * k;
          shakeX += (Math.random() - 0.5) * strength;
          shakeY += (Math.random() - 0.5) * strength * 0.35;
          shakeZ += (Math.random() - 0.5) * strength * 0.22;
          shakeYaw += (Math.random() - 0.5) * strength * 0.22;
          shakePitch += (Math.random() - 0.5) * strength * 0.18;
        }

        if (screenShake.hurtTimer > 0) {
          const k = screenShake.hurtTimer / 0.14;
          const strength = screenShake.hurtStrength * k;
          shakeX += (Math.random() - 0.5) * strength;
          shakeY += (Math.random() - 0.5) * strength * 0.55;
          shakeYaw += (Math.random() - 0.5) * strength * 0.3;
          shakePitch += (Math.random() - 0.5) * strength * 0.26;
        }

        if (thunderRumble.timer > 0) {
          const k = thunderRumble.timer / 0.48;
          const pulse = Math.sin((1 - k) * 44) * 0.5 + 0.5;
          const strength = thunderRumble.strength * k * pulse;
          shakeX += (Math.random() - 0.5) * strength;
          shakeY += (Math.random() - 0.5) * strength * 0.6;
          shakeYaw += (Math.random() - 0.5) * strength * 0.3;
          shakePitch += (Math.random() - 0.5) * strength * 0.25;
        }

        camera.position.x = player.x + shakeX;
        camera.position.z = player.z + shakeZ;
        camera.position.y = 1.03 + Math.sin(player.bobPhase) * 0.02 + shakeY;
        camera.rotation.set(player.pitch + shakePitch, player.yaw + shakeYaw, 0, 'YXZ');
      }

      function updateEnemies(dt) {
        const enemyRadius = 0.26;
        enemies.forEach((enemy) => {
          const data = enemy.userData;

          enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);

          // Pain/stun countdown — freeze enemy movement while flashing
          if (data.isStunned) {
            data.stunTimer -= dt;
            if (data.stunTimer <= 0) {
              data.isStunned = false;
              if (data._origColor) enemy.material.color.copy(data._origColor);
              else enemy.material.color.setHex(0xffffff);
            }
            return; // no AI movement while stunned
          }

          if (!data.alive) {
            if (data.dying > 0) {
              data.dying = Math.max(0, data.dying - dt * 2.2);
              data.deathTimer += dt;
              if (data.deathFrame === 0 && data.deathTimer >= 0.14) {
                data.deathFrame = 1;
                enemy.material.map = enemyTextures[data.type].dead2;
                enemy.material.needsUpdate = true;
              }
              enemy.material.opacity = data.dying;
              enemy.scale.set(
                data.baseScaleX * (0.72 + data.dying * 0.28),
                data.baseScaleY * Math.max(0.16, data.dying),
                1
              );
              enemy.position.y = 0.35 + data.dying * 0.44;
            }
            return;
          }

          const t = performance.now() * 0.001 + data.wanderSeed;
          const pdx = player.x - enemy.position.x;
          const pdz = player.z - enemy.position.z;
          const playerDist = Math.hypot(pdx, pdz);
          const seesPlayer = hasLineOfSight(enemy.position.x, enemy.position.z, player.x, player.z);

          const tx = player.x;
          const tz = player.z;

          const dx = tx - enemy.position.x;
          const dz = tz - enemy.position.z;
          const dist = Math.hypot(dx, dz);

          if (dist > 0.02) {
            const speed = seesPlayer ? 1.22 : 0.82;
            const stepX = (dx / dist) * speed * dt;
            const stepZ = (dz / dist) * speed * dt;
            const nx = enemy.position.x + stepX;
            const nz = enemy.position.z + stepZ;

            // Slide along walls when direct movement is blocked.
            if (canMoveTo(nx, nz, enemyRadius)) {
              enemy.position.x = nx;
              enemy.position.z = nz;
            } else {
              if (canMoveTo(nx, enemy.position.z, enemyRadius)) enemy.position.x = nx;
              if (canMoveTo(enemy.position.x, nz, enemyRadius)) enemy.position.z = nz;
            }
          }

          const moved = Math.hypot(enemy.position.x - data.prevX, enemy.position.z - data.prevZ);
          if (dist > 0.9 && moved < 0.003) {
            data.stuckTimer += dt;
          } else {
            data.stuckTimer = Math.max(0, data.stuckTimer - dt * 0.8);
          }

          if (data.stuckTimer > 0.55) {
            const rescue = findEnemySafeSpawn(enemy.position.x, enemy.position.z);
            enemy.position.x = rescue.x;
            enemy.position.z = rescue.z;
            data.stuckTimer = 0;
          }

          if (dist < 1.6) {
            data.lunge = Math.min(1, data.lunge + dt * 3.2);
          } else {
            data.lunge = Math.max(0, data.lunge - dt * 2.2);
          }

          data.prevX = enemy.position.x;
          data.prevZ = enemy.position.z;

          enemy.position.y = 0.79 + Math.sin(t * 3.1 + data.bobSeed) * 0.035;
          enemy.scale.x = data.baseScaleX * (1 + Math.sin(t * 5.3 + data.bobSeed) * 0.03 + data.lunge * 0.05);
          enemy.scale.y = data.baseScaleY * (1 + Math.cos(t * 4.4 + data.bobSeed) * 0.04 + data.lunge * 0.08);

          const pd = Math.hypot(enemy.position.x - player.x, enemy.position.z - player.z);
          data.attackCooldown = Math.max(0, data.attackCooldown - dt);
          if (pd < 1.05 && data.attackCooldown <= 0 && player.health > 0) {
            player.health = Math.max(0, player.health - 10);
            player.damageTimer = 0.28;
            data.attackCooldown = 1;
            hitFlash.style.opacity = '0.75';
            setTimeout(() => { hitFlash.style.opacity = '0'; }, 100);
            screenShake.hurtTimer = 0.14;
            screenShake.hurtStrength = 0.06;
            facePlayerHurt();
            faceUpdateHealth(player.health);
            if (player.health <= 0) {
              setGameState('gameover');
            }
          }
        });
      }

      function updatePickups(dt, elapsed) {
        pickups.forEach((pickup) => {
          if (pickup.taken) return;
          pickup.mesh.rotation.y += dt * 1.8;
          pickup.mesh.position.y = pickup.baseY + Math.sin(elapsed * 2.8 + pickup.phase) * 0.06;

          const pd = Math.hypot(pickup.mesh.position.x - player.x, pickup.mesh.position.z - player.z);
          if (pd > 0.45) return;

          pickup.taken = true;
          pickup.mesh.visible = false;
          if (pickup.mesh.parent) pickup.mesh.parent.remove(pickup.mesh);

          if (pickup.type === 'medkit') {
            player.health = Math.min(100, player.health + 25);
            pickupFlash.style.background = 'rgba(118, 241, 173, 0.24)';
            statusTextEl.textContent = 'Picked up medkit (+25 health).';
          } else if (pickup.type === 'ammo') {
            player.ammo = Math.min(player.maxAmmo, player.ammo + 20);
            pickupFlash.style.background = 'rgba(124, 187, 255, 0.26)';
            statusTextEl.textContent = 'Picked up ammo box (+20 ammo).';
          } else {
            player.hasKey = true;
            pickupFlash.style.background = 'rgba(244, 218, 124, 0.28)';
            unlockAllGates();
          }

          pickupFlash.style.opacity = '0.95';
          setTimeout(() => { pickupFlash.style.opacity = '0'; }, 130);
        });
      }

      function updateExit(elapsed) {
        if (!levelExit.group || !levelExit.glow) return;
        const pulse = 0.68 + Math.sin(elapsed * 3.1 + levelExit.pulseSeed) * 0.2;
        levelExit.group.rotation.y += 0.006;
        levelExit.glow.scale.setScalar(0.88 + pulse * 0.25);
        levelExit.glow.material.opacity = Math.max(0.45, pulse);

        const exitDist = Math.hypot(levelExit.x - player.x, levelExit.z - player.z);
        if (exitDist < 0.58 && player.health > 0) {
          onLevelComplete();
        }
      }

      function setGameState(nextState, payload = {}) {
        if (gameState === nextState) return;
        gameState = nextState;

        if (levelAdvanceTimer && (nextState === 'gameover' || nextState === 'campaign-clear' || nextState === 'start')) {
          clearTimeout(levelAdvanceTimer);
          levelAdvanceTimer = null;
        }

        if (nextState === 'playing') {
          gameActive = true;
          startPrompt.classList.add('hidden');
          stateOverlay.classList.add('hidden');
          statusTextEl.textContent = 'Sector active. Hunt and survive.';
          return;
        }

        gameActive = false;
        move.forward = false;
        move.backward = false;
        move.left = false;
        move.right = false;

        const shouldReleasePointer = nextState === 'start' || nextState === 'gameover' || nextState === 'campaign-clear';
        if (shouldReleasePointer && document.pointerLockElement === renderer.domElement && document.exitPointerLock) {
          document.exitPointerLock();
        }

        if (nextState === 'start') {
          startPrompt.classList.remove('hidden');
          stateOverlay.classList.add('hidden');
          const levelName = LEVELS[currentLevel]?.name || 'Sector';
          statusTextEl.textContent = `${levelName}: click to engage`;
          return;
        }

        startPrompt.classList.add('hidden');
        stateOverlay.classList.remove('hidden');
        stateActionBtn.style.display = '';

        if (nextState === 'gameover') {
          stateTitleEl.textContent = 'You Died';
          stateStatsEl.textContent = `Campaign Kills: ${player.campaignKills}\nReached Level: ${currentLevel + 1}`;
          stateActionBtn.textContent = 'Restart';
          statusTextEl.textContent = 'You were overrun.';
          return;
        }

        if (nextState === 'level-complete') {
          stateTitleEl.textContent = payload.title || 'Level Complete';
          stateStatsEl.textContent = payload.stats || '';
          stateActionBtn.style.display = 'none';
          statusTextEl.textContent = 'Preparing next level...';
          return;
        }

        if (nextState === 'campaign-clear') {
          stateTitleEl.textContent = 'Campaign Conquered';
          stateStatsEl.textContent = `Final Kills: ${player.campaignKills}\nRemaining Ammo: ${player.ammo}`;
          stateActionBtn.textContent = 'Play Again';
          statusTextEl.textContent = 'The castle falls silent.';
        }
      }

      function onLevelComplete() {
        if (gameState !== 'playing') return;
        const isFinal = currentLevel >= LEVELS.length - 1;
        setGameState('level-complete', {
          title: 'LEVEL COMPLETE',
          stats: `Level ${currentLevel + 1} cleared\nEnemies Killed: ${player.levelKills}\nAmmo Left: ${player.ammo}`
        });

        levelAdvanceTimer = setTimeout(() => {
          if (isFinal) {
            setGameState('campaign-clear');
            return;
          }
          currentLevel += 1;
          loadLevel(currentLevel, { preserveStats: true });
          setGameState('playing');
          if (renderer.domElement.requestPointerLock && document.pointerLockElement !== renderer.domElement) {
            try {
              renderer.domElement.requestPointerLock();
            } catch (_) {
              // Auto-lock can be blocked by browser; movement still stays active.
            }
          }
        }, 3000);
      }

      function castShot() {
        if (player.ammo <= 0 || player.health <= 0 || gameState !== 'playing') return;
        if (player.shootCooldown > 0) return;

        player.shootCooldown = 0.18;
        player.recoil = 1;
        player.ammo -= 1;
        muzzleFlashLight.intensity = 2.25;
        screenShake.shootTimer = 0.08;
        screenShake.shootStrength = 0.05;

        screenFlash.style.opacity = '0.78';
        setTimeout(() => { screenFlash.style.opacity = '0'; }, 55);

        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(enemies, false);
        const hit = intersects.find((entry) => entry.object.userData.alive);

        if (hit) {
          const enemy = hit.object;
          const eData = enemy.userData;
          eData.health = (eData.health || 1) - 1;

          if (eData.health <= 0) {
            // Kill the enemy
            eData.alive = false;
            eData.dying = 1;
            eData.deathFrame = 0;
            eData.deathTimer = 0;
            enemy.material.map = enemyTextures[eData.type].dead1;
            enemy.material.needsUpdate = true;
            player.levelKills += 1;
            player.campaignKills += 1;
            spawnGibs(enemy.position);
            statusTextEl.textContent = 'Target neutralized.';
          } else {
            // Pain flash — stun and tint red, restore after stunTimer expires
            eData.isStunned = true;
            eData.stunTimer = 0.12;
            if (!eData._origColor) eData._origColor = enemy.material.color.clone();
            enemy.material.color.setHex(0xff3333);
            statusTextEl.textContent = 'Target hit!';
          }
        } else {
          statusTextEl.textContent = 'Shot missed.';
        }
      }

      function updateWeapon(dt) {
        const bob = player.moving ? Math.sin(player.bobPhase * 1.2) * 6 : 0;
        if (player.recoil > 0) {
          player.recoil = Math.max(0, player.recoil - dt * 6.8);
        }

        const recoilY = (1 - player.recoil) * 8;
        const recoilScale = 1 + player.recoil * 0.08;
        weaponImg.style.transform = `translateX(-50%) translateY(${bob - recoilY}px) scale(${recoilScale})`;
      }

      function updateHud() {
        healthValueEl.textContent = `${Math.max(0, Math.round(player.health))}%`;
        ammoValueEl.textContent = String(player.ammo);
        killValueEl.textContent = `Lv ${currentLevel + 1}/${LEVELS.length} - Kills ${player.levelKills} / ${levelEnemyTarget}`;
        healthBarFillEl.style.width = `${Math.max(0, player.health)}%`;
        ammoBarFillEl.style.width = `${(player.ammo / player.maxAmmo) * 100}%`;

        healthValueEl.style.color = player.health <= 30 ? 'var(--danger)' : 'var(--hud-text)';
        ammoValueEl.style.color = player.ammo <= 4 ? 'var(--danger)' : 'var(--hud-text)';
        faceUpdateHealth(player.health);
      }

      // --- Doom Face HUD — pixel-art canvas face that reacts to health and damage ---
      let doomFaceCanvas = null;
      let doomFaceCtx = null;
      const doomFaceState = { look: 0, painTimer: 0, healthClass: 'normal', lookTimer: 2 };

      function initDoomFace() {
        doomFaceCanvas = document.getElementById('doom-face-canvas');
        if (!doomFaceCanvas) return;
        doomFaceCtx = doomFaceCanvas.getContext('2d');
        drawDoomFace();
      }

      function drawDoomFace() {
        if (!doomFaceCtx) return;
        const ctx = doomFaceCtx;
        ctx.clearRect(0, 0, 32, 32);
        const isPain = doomFaceState.painTimer > 0;
        const hc = doomFaceState.healthClass;
        const look = doomFaceState.look; // -1 left | 0 center | 1 right
        // Skin tone degrades with health
        const skin = hc === 'bloody' ? '#8a3a3a' : hc === 'hurt' ? '#c47a6a' : '#d4a47c';
        ctx.fillStyle = skin;
        ctx.beginPath(); ctx.ellipse(16, 17, 10, 12, 0, 0, Math.PI * 2); ctx.fill();
        // Helmet/hair
        ctx.fillStyle = hc === 'bloody' ? '#4a1515' : '#3a2f2f';
        ctx.fillRect(6, 3, 20, 7);
        ctx.fillRect(6, 3, 4, 12);
        ctx.fillRect(22, 3, 4, 12);
        // Eyes shifted by look direction
        const ex = look * 2;
        ctx.fillStyle = isPain ? '#ff3333' : '#ffffff';
        ctx.fillRect(9 + ex, 12, 4, 4);
        ctx.fillRect(19 + ex, 12, 4, 4);
        ctx.fillStyle = '#111';
        ctx.fillRect(10 + ex + look, 13, 2, 2);
        ctx.fillRect(20 + ex + look, 13, 2, 2);
        // Mouth expression
        if (isPain) {
          ctx.fillStyle = '#200'; ctx.fillRect(11, 22, 10, 4);
          ctx.fillStyle = '#ff5555'; ctx.fillRect(12, 23, 8, 2);
        } else if (hc === 'bloody') {
          ctx.fillStyle = '#300'; ctx.fillRect(11, 23, 10, 2);
          ctx.fillStyle = '#aa0000';
          ctx.fillRect(14, 19, 2, 4); ctx.fillRect(18, 21, 2, 3); // blood drips
        } else if (hc === 'hurt') {
          ctx.fillStyle = '#442222'; ctx.fillRect(12, 23, 8, 2);
        } else {
          ctx.fillStyle = '#553333'; ctx.fillRect(13, 23, 6, 2);
        }
      }

      function updateDoomFace(dt) {
        if (!doomFaceCanvas) return;
        if (doomFaceState.painTimer > 0) {
          doomFaceState.painTimer = Math.max(0, doomFaceState.painTimer - dt);
          if (doomFaceState.painTimer === 0) drawDoomFace(); // restore after pain
          return;
        }
        doomFaceState.lookTimer -= dt;
        if (doomFaceState.lookTimer <= 0) {
          const opts = [-1, 0, 0, 1]; // weighted toward center
          doomFaceState.look = opts[Math.floor(Math.random() * opts.length)];
          doomFaceState.lookTimer = 1.5 + Math.random() * 3;
          drawDoomFace();
        }
      }

      function facePlayerHurt() {
        if (!doomFaceCanvas) return;
        doomFaceState.painTimer = 0.5;
        drawDoomFace();
      }

      function faceUpdateHealth(health) {
        const prev = doomFaceState.healthClass;
        doomFaceState.healthClass = health > 50 ? 'normal' : health > 25 ? 'hurt' : 'bloody';
        if (prev !== doomFaceState.healthClass && doomFaceState.painTimer <= 0) drawDoomFace();
      }

      function setKeyState(code, down) {
        // FPS layout: W forward, S backward, A strafe left, D strafe right.
        if (code === 'KeyW') move.backward = down;
        if (code === 'KeyS') move.forward = down;
        if (code === 'ArrowUp') move.forward = down;
        if (code === 'ArrowDown') move.backward = down;
        if (code === 'KeyA' || code === 'ArrowLeft') move.left = down;
        if (code === 'KeyD' || code === 'ArrowRight') move.right = down;
      }

      function resetGame() {
        currentLevel = 0;
        gameState = 'start';
        gameActive = false;
        player.yaw = 0;
        player.pitch = 0;
        player.health = 100;
        player.ammo = player.maxAmmo;
        player.hasKey = false;
        player.levelKills = 0;
        player.campaignKills = 0;
        player.recoil = 0;
        player.bobPhase = 0;
        player.shootCooldown = 0;
        player.damageTimer = 0;
        player.moving = false;
        statusTextEl.textContent = 'Click to lock pointer and begin';
        muzzleFlashLight.intensity = 0;
        screenShake.shootTimer = 0;
        screenShake.hurtTimer = 0;
        hitFlash.style.opacity = '0';
        pickupFlash.style.opacity = '0';
        screenFlash.style.opacity = '0';
        loadLevel(currentLevel, { preserveStats: false });
        setGameState('start');
        updateCamera();
        updateHud();
        initDoomFace();
      }

      function onPointerLockChange() {
        const locked = document.pointerLockElement === renderer.domElement;
        if (locked) {
          setGameState('playing');
          statusTextEl.textContent = 'Pointer lock active.';
          if (pointerLockFallbackTimer) {
            clearTimeout(pointerLockFallbackTimer);
            pointerLockFallbackTimer = null;
          }
          return;
        }

        if (gameState === 'playing' && player.health > 0) {
          gameActive = false;
          startPrompt.classList.remove('hidden');
          statusTextEl.textContent = 'Click to resume control';
        }
      }

      function lockPointer() {
        if (gameState !== 'start' && gameState !== 'playing') return;
        setGameState('playing');
        startPrompt.classList.add('hidden');
        statusTextEl.textContent = 'Engaging controls...';

        if (pointerLockFallbackTimer) clearTimeout(pointerLockFallbackTimer);
        pointerLockFallbackTimer = setTimeout(() => {
          if (document.pointerLockElement !== renderer.domElement) {
            statusTextEl.textContent = 'Pointer lock blocked. Movement is active; click viewport to fire.';
          }
        }, 260);

        try {
          if (renderer.domElement.requestPointerLock) {
            renderer.domElement.requestPointerLock();
          }
        } catch (_) {
          statusTextEl.textContent = 'Pointer lock unavailable. Movement is active.';
        }
      }

      function onResize(force = false) {
        const w = Math.max(1, Math.floor(container.clientWidth));
        const h = Math.max(1, Math.floor(container.clientHeight));

        if (!force && w === lastViewportW && h === lastViewportH) {
          return;
        }

        lastViewportW = w;
        lastViewportH = h;

        // Only update camera aspect; renderer stays at fixed 320×240 retro resolution
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      function setupResizeSync() {
        if (typeof ResizeObserver === 'function') {
          resizeObserver = new ResizeObserver(() => {
            requestAnimationFrame(() => onResize(true));
          });
          resizeObserver.observe(container);
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', () => onResize(true));
        }
      }

      function animate() {
        const dt = Math.min(0.05, clock.getDelta());
        const elapsed = performance.now() * 0.001;

        if (player.shootCooldown > 0) player.shootCooldown = Math.max(0, player.shootCooldown - dt);
        if (player.damageTimer > 0) player.damageTimer = Math.max(0, player.damageTimer - dt);
        if (screenShake.shootTimer > 0) screenShake.shootTimer = Math.max(0, screenShake.shootTimer - dt);
        if (screenShake.hurtTimer > 0) screenShake.hurtTimer = Math.max(0, screenShake.hurtTimer - dt);
        if (thunderRumble.timer > 0) thunderRumble.timer = Math.max(0, thunderRumble.timer - dt);
        if (muzzleFlashLight.intensity > 0) {
          muzzleFlashLight.intensity = Math.max(0, muzzleFlashLight.intensity - dt * 45);
        }

        torchUpdateAccumulator += dt;

        if (gameState === 'playing' && gameActive && player.health > 0) {
          updateMovement(dt);
          updateEnemies(dt);
          updatePickups(dt, elapsed);
          updateExit(elapsed);
          updateSecretWalls(dt);
        }
        updateGibs(dt);
        updateDoomFace(dt);

        updateCamera();
        updateWeapon(dt);
        updateHud();
        if (torchUpdateAccumulator >= TORCH_UPDATE_STEP) {
          updateTorches(elapsed, torchUpdateAccumulator);
          updateAtmosphere(torchUpdateAccumulator, elapsed);
          torchUpdateAccumulator = 0;
        }
        frameTicker = (frameTicker + 1) % 20;
        if (frameTicker === 0) onResize(false);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      document.addEventListener('keydown', (event) => {
        setKeyState(event.code, true);
        if (event.code === 'KeyE') eKeyDown = true;

        if (event.code === 'Space') {
          event.preventDefault();
          castShot();
        }

        if (event.code === 'KeyR') {
          event.preventDefault();
          resetGame();
        }
      });

      document.addEventListener('keyup', (event) => {
        setKeyState(event.code, false);
        if (event.code === 'KeyE') eKeyDown = false;
      });

      renderer.domElement.addEventListener('click', () => {
        if (document.pointerLockElement !== renderer.domElement) {
          lockPointer();
          return;
        }
        castShot();
      });

      document.addEventListener('mousemove', (event) => {
        if (document.pointerLockElement !== renderer.domElement) return;
        player.yaw -= event.movementX * LOOK_SENSITIVITY_X;
        player.pitch -= event.movementY * LOOK_SENSITIVITY_Y;
        player.pitch = Math.max(-MAX_LOOK_PITCH, Math.min(MAX_LOOK_PITCH, player.pitch));
      });

      document.addEventListener('pointerlockchange', onPointerLockChange);
      document.addEventListener('pointerlockerror', () => {
        setGameState('playing');
        startPrompt.classList.add('hidden');
        statusTextEl.textContent = 'Pointer lock denied. Movement is active; click viewport to fire.';
      });

      startPrompt.addEventListener('click', lockPointer);
      startPrompt.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          lockPointer();
        }
      });

      stateActionBtn.addEventListener('click', () => {
        resetGame();
      });

      window.addEventListener('resize', onResize);
      setupResizeSync();

      makeWeaponSprite();
      onResize(true);
      resetGame();
      animate();
    })();
  </script>
</body>
</html>
