<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream - Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    .page {
      max-width: 99% !important; /* Wider width for stream page */
    }

    .stream-container {
      display: flex;
      flex: 1;
      gap: 5px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      min-height: 0;
    }
    .stream-player {
      flex: 5; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stream-chat {
      flex: 1; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #0d1117;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Removed the filter invert trick */
    .stream-chat iframe {
      filter: none;
    }
    /* Force Twitch/YouTube chat frames to look darker if possible via query params */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: var(--surface);
      border-radius: 20px;
      margin-bottom: 5px;
    }

    /* Dropdown Styles */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(109, 140, 255, 0.16);
      color: #e9f0ff;
      border: 1px solid rgba(109, 140, 255, 0.18);
      font-size: 13px;
      font-weight: 500;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 160px;
      z-index: 20;
      padding: 8px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      display: block;
      padding: 8px 12px;
      text-decoration: none;
      color: #e8ecef;
      border-radius: 8px;
      font-size: 13px;
    }

    .dropdown-content a:hover {
      background: rgba(109, 140, 255, 0.14);
      color: #f6f8ff;
    }
  </style>
</head>
<body class="home-page" onload="renderList()">
  <div class="page">
    <header>
      <div class="header-left">
        <a href="index.html" class="home-button">Home</a>
        <a href="dashboard.html" class="home-button">Dashboard</a>
        <a href="stream.html" class="home-button">Stream</a>
      </div>

      <!-- Moved controls here -->
      <div class="controls" style="display: inline-flex; justify-content: flex-start; margin-bottom: 5px;">
        <input type="text" id="streamUrl" placeholder="YouTube URL or Twitch Channel Name" onkeydown="if(event.key === 'Enter') loadStream()" style="width: 350px; padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: #fff; outline: none; font-size: 13px;">
        <button onclick="loadStream()" style="padding: 8px 16px; border-radius: 999px; background: rgba(109, 140, 255, 0.16); color: #e9f0ff; border: 1px solid rgba(109, 140, 255, 0.18); cursor: pointer; font-size: 13px; margin-left: 5px; font-weight: 500; transition: all 180ms ease;">Load</button>
        <button onclick="toggleChat()" style="padding: 8px 16px; border-radius: 999px; background: rgba(109, 140, 255, 0.16); color: #e9f0ff; border: 1px solid rgba(109, 140, 255, 0.18); cursor: pointer; font-size: 13px; margin-left: 5px; font-weight: 500; transition: all 180ms ease;">Toggle Chat</button>

        <!-- Streamer Dropdown -->
        <div class="dropdown" style="margin-left: 5px;">
          <button class="dropbtn">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div id="listItems"></div>
            <div style="border-top: 1px solid var(--border); margin: 5px 0;"></div>
            <a href="#" onclick="addStreamer()" style="color: var(--accent);">Add Streamer...</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script>
    function loadStreamDirect(url) {
      document.getElementById('streamUrl').value = url;
      loadStream();
    }

    function renderList() {
        let list = JSON.parse(localStorage.getItem('myStreamers')) || [{name: 'hutchmf', url: 'hutchmf'}, {name: 'shroud', url: 'shroud'}];
        const container = document.getElementById('listItems');
        container.innerHTML = '';
        list.forEach((item, index) => {
            container.innerHTML += '<div style="display:flex; justify-content:space-between; align-items:center; padding:5px;">' +
                '<a href="#" onclick="loadStreamDirect(\'' + item.url + '\')">' + item.name + '</a>' +
                '<button onclick="removeStreamer(' + index + ')" style="background:none; border:none; color:red; cursor:pointer;">x</button>' +
                '</div>';
        });
    }

    function addStreamer() {
        let name = prompt("Enter Name:");
        let url = prompt("Enter Channel/URL:");
        if (name && url) {
            let list = JSON.parse(localStorage.getItem('myStreamers')) || [];
            list.push({name, url});
            localStorage.setItem('myStreamers', JSON.stringify(list));
            renderList();
        }
    }

    function removeStreamer(index) {
        let list = JSON.parse(localStorage.getItem('myStreamers'));
        list.splice(index, 1);
        localStorage.setItem('myStreamers', JSON.stringify(list));
        renderList();
        event.stopPropagation();
    }

    function loadStream() {
      const inputElement = document.getElementById('streamUrl');
      const input = inputElement.value.trim();
      const player = document.getElementById('player');
      const chat = document.getElementById('chat');
      
      if (!input) return;
      if (input.includes('youtube.com') || input.includes('youtu.be') || input.includes('@')) {
        let videoId = "";
        // More robust YouTube URL parsing
        if (input.includes('v=')) {
          videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
          videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if (input.includes('/embed/')) {
          videoId = input.split('/embed/')[1].split('?')[0];
        } else if (input.includes('@')) {
            videoId = input.split('@').pop().split('/')[0];
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${videoId}&autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            chat.innerHTML = `<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1"></iframe>`;
            return;
        } else {
          videoId = input.split('/').pop();
        }

        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;

        const chatIframe = document.createElement('iframe');
        chatIframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1`;

        chatIframe.onload = function() {
          try {
            const body = chatIframe.contentDocument.body;
            if (body && body.innerText.includes('disabled')) {
              chat.style.display = 'none';
            } else {
        chat.style.display = 'block';
    }
          } catch(e) {
            chat.style.display = 'block';
    }
        };

        chat.innerHTML = '';
        chat.appendChild(chatIframe);

        inputElement.dataset.lastInput = videoId;
        inputElement.value = "You are Watching: " + videoId;
      } else {
        const channel = input.includes('twitch.tv/') ? input.split('twitch.tv/').pop().split('/')[0] : input;
        player.innerHTML = '<iframe src="https://player.twitch.tv/?channel=' + channel + '&parent=' + window.location.hostname + '&autoplay=true&muted=false" allow="autoplay; fullscreen" allowfullscreen></iframe>';
        chat.innerHTML = '<iframe src="https://www.twitch.tv/embed/' + channel + '/chat?parent=' + window.location.hostname + '&darkpopout"></iframe>';
        chat.style.display = 'block';
        inputElement.dataset.lastInput = channel;
        inputElement.value = "You are Watching: " + channel;
    }
    }

    function toggleChat() {
      const chat = document.getElementById('chat');
      chat.style.display = (chat.style.display === 'none') ? 'block' : 'none';
    }

    document.getElementById('streamUrl').addEventListener('focus', function() {
      if (this.dataset.lastInput) this.value = this.dataset.lastInput;
    });

    // Prevent the browser from throttling the stream in background tabs
    document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
            console.log("Tab is hidden, but stream should continue...");
        }
    });

    window.onload = renderList;
  </script>
</body>
</html>
