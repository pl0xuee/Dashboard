<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream - Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    .page {
      max-width: 99% !important; /* Wider width for stream page */
    }

    .stream-container {
      display: flex;
      flex: 1;
      gap: 5px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      min-height: 0;
    }
    .stream-player {
      flex: 5; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stream-chat {
      flex: 1; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #0d1117;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Removed the filter invert trick */
    .stream-chat iframe {
      filter: none;
    }
    /* Force Twitch/YouTube chat frames to look darker if possible via query params */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: var(--surface);
      border-radius: 20px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body class="home-page">
  <div class="page">
    <header>
      <div class="header-left">
        <a href="index.html" class="home-button">Home</a>
        <a href="dashboard.html" class="home-button">Dashboard</a>
        <a href="stream.html" class="home-button">Stream</a>
      </div>
    </header>
    <main class="main">
      <div class="controls" style="display: flex; justify-content: flex-start; margin-bottom: 5px;">
        <input type="text" id="streamUrl" placeholder="YouTube/Twitch URL" onkeydown="if(event.key === 'Enter') loadStream()" style="width: 250px; padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: #fff; outline: none; font-size: 13px;">
        <button onclick="loadStream()" class="load-button" style="padding: 8px 16px; border-radius: 999px; background: rgba(109, 140, 255, 0.16); color: #e9f0ff; border: 1px solid rgba(109, 140, 255, 0.18); cursor: pointer; font-size: 13px; margin-left: 5px; font-weight: 500; transition: all 180ms ease;">Load</button>
      </div>
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script>
    function loadStream() {
      const url = document.getElementById('streamUrl').value;
      const player = document.getElementById('player');
      const chat = document.getElementById('chat');
      
      // Simple logic to detect if YouTube or Twitch
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        const videoId = url.split('v=')[1] || url.split('/').pop();
        // Add dark theme parameter to YouTube embed
        player.innerHTML = '<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allowfullscreen></iframe>';
        chat.innerHTML = '<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1"></iframe>';
      } else if (url.includes('twitch.tv')) {
        const channel = url.split('/').pop();
        // Add dark theme parameter to Twitch embed
        player.innerHTML = '<iframe src="https://player.twitch.tv/?channel=${channel}&parent=${window.location.hostname}&darkmode=true" allowfullscreen></iframe>';
        // Use 'darkpopout' as suggested
        chat.innerHTML = '<iframe src="https://www.twitch.tv/embed/${channel}/chat?parent=${window.location.hostname}&darkpopout"></iframe>';
      }
    }
  </script>
</body>
</html>
