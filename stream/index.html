<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream - Command Center</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    .page {
      max-width: 99% !important; /* Wider width for stream page */
    }

    .stream-container {
      display: flex;
      flex: 1;
      gap: 5px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      min-height: 0;
    }
    .stream-player {
      flex: 5; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stream-chat {
      flex: 1; /* Adjusted ratio: 5:1 */
      height: 100%;
      background: #0d1117;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Removed the filter invert trick */
    .stream-chat iframe {
      filter: none;
    }
    /* Force Twitch/YouTube chat frames to look darker if possible via query params */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      /* padding: 10px; */ /* Removed */
      background: transparent; /* Removed background */
      border-radius: 20px;
      margin-bottom: 0; /* Adjusted */
    }

        /* Dropdown Styles */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: max-content; /* Shrink-to-fit content */
      min-width: 140px; /* Smaller minimum */
      max-width: 200px; /* Tighter maximum */
      z-index: 20;
      padding: 6px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      right: 0; /* Anchor to the right edge of the button */
      top: 100%; /* Position below the button */
      margin-top: 0px; /* Reduced from 5px to 0px to close the gap */
    }

    .dropdown:hover .dropdown-content { display: block; }

    .dropdown-content a {
      display: block;
      padding: 8px 12px;
      text-decoration: none;
      color: #e8ecef;
      border-radius: 8px;
      font-size: 13px;
    }

    .dropdown-content a:hover {
      background: rgba(109, 140, 255, 0.14);
      color: #f6f8ff;
    }
  </style>
</head>
<body class="stream-page">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" placeholder="YouTube URL or Twitch Channel Name" onkeydown="if(event.key === 'Enter') loadStream()" style="width: 350px; height: 38px; padding: 0 12px; margin: 0 4px;">
        <button onclick="loadStream()" class="home-button">Load</button>
        <button onclick="toggleChat()" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div id="listItems"></div>
            <div style="border-top: 1px solid var(--border); margin: 5px 0;"></div>
            <a href="#" onclick="addStreamer()" class="home-button" style="width: 100%;">Add Streamer...</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../script.js"></script>
  <script type="module">
    import { API_KEY } from '../config.js';
    window.API_KEY = API_KEY;
  </script>

  <script>
    window.loadStream = function() {
      const inputElement = document.getElementById('streamUrl');
      const input = inputElement.value.trim();
      const player = document.getElementById('player');
      const chat = document.getElementById('chat');
      
      if (!input) return;
      if (input.includes('youtube.com') || input.includes('youtu.be') || input.includes('@')) {
        let videoId = "";
        if (input.includes('v=')) {
          videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
          videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if (input.includes('/embed/')) {
          videoId = input.split('/embed/')[1].split('?')[0];
        } else if (input.includes('@')) {
            videoId = input.split('@').pop().split('/')[0];
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${videoId}&autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            chat.innerHTML = `<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1"></iframe>`;
            return;
        } else {
          videoId = input.split('/').pop();
        }

        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;

        const chatIframe = document.createElement('iframe');
        chatIframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1`;

        chatIframe.onload = function() {
          try {
            const body = chatIframe.contentDocument.body;
            if (body && body.innerText.includes('disabled')) {
              chat.style.display = 'none';
            } else {
                chat.style.display = 'block';
            }
          } catch(e) {
            chat.style.display = 'block';
    }
        };

        chat.innerHTML = '';
        chat.appendChild(chatIframe);

        inputElement.dataset.lastInput = videoId;
        inputElement.value = "You are Watching: " + videoId;
      } else {
        const channel = input.includes('twitch.tv/') ? input.split('twitch.tv/').pop().split('/')[0] : input;
        player.innerHTML = '<iframe src="https://player.twitch.tv/?channel=' + channel + '&parent=' + window.location.hostname + '&autoplay=true&muted=false" allow="autoplay; fullscreen" allowfullscreen></iframe>';
        chat.innerHTML = '<iframe src="https://www.twitch.tv/embed/' + channel + '/chat?parent=' + window.location.hostname + '&darkpopout"></iframe>';
        chat.style.display = 'block';
        inputElement.dataset.lastInput = channel;
        inputElement.value = "You are Watching: " + channel;
      }
    };

    window.toggleChat = function() {
      const chat = document.getElementById('chat');
      chat.style.display = (chat.style.display === 'none') ? 'block' : 'none';
    };

    window.loadStreamDirect = function(url) {
      document.getElementById('streamUrl').value = url;
      loadStream();
    };

    async function renderList() {
        let list = JSON.parse(localStorage.getItem('myStreamers')) || [{name: 'hutchmf', url: 'hutchmf'}, {name: 'shroud', url: 'shroud'}];
        const streamerStatuses = await Promise.all(list.map(async (item) => {
            const isOnline = await getTwitchStatus(item.url);
            return { ...item, isOnline };
        }));
        streamerStatuses.sort((a, b) => b.isOnline - a.isOnline);
        const container = document.getElementById('listItems');
        container.innerHTML = '';
        streamerStatuses.forEach((item, index) => {
            const statusColor = item.isOnline ? "#00ff00" : "#ff3333";
            container.innerHTML += `
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 2px 4px;">
                    <a href="#" onclick="loadStreamDirect('${item.url}')" style="display: flex; align-items: center; text-decoration: none; color: #e8ecef; flex-grow: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <span id="dot-${index}" style="margin-right: 6px; font-size: 8px; color: ${statusColor}; flex-shrink: 0;">●</span>
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}</span>
                    </a>
                    <button onclick="removeStreamer('${item.name}')"
                            style="background:none; border:none; color:rgba(255,50,50,0.5); cursor:pointer; font-size: 16px; margin-left: 8px; padding: 0 4px; flex-shrink: 0; transition: all 0.2s;"
                            onmouseover="this.style.color='rgba(255,50,50,1)'; this.style.transform='scale(1.2)';"
                            onmouseout="this.style.color='rgba(255,50,50,0.5)'; this.style.transform='scale(1)';"
                    >×</button>
                </div>`;
        });
    }

    async function getTwitchStatus(url) {
        if (url.includes('youtube')) return false;
        const channel = url.includes('twitch.tv/') ? url.split('twitch.tv/').pop().split('/')[0] : url;
        try {
            const response = await fetch(`https://decapi.me/twitch/uptime/${channel}`);
            const text = await response.text();
            return !text.includes("offline") && !text.includes("not found");
        } catch (e) {
            return false;
        }
    }

    window.removeStreamer = function(name) {
        let list = JSON.parse(localStorage.getItem('myStreamers'));
        list = list.filter(item => item.name !== name);
        localStorage.setItem('myStreamers', JSON.stringify(list));
        renderList();
        event.stopPropagation();
    };

    window.addStreamer = function() {
        let name = prompt("Enter Name:");
        let url = prompt("Enter Channel/URL:");
        if (name && url) {
            let list = JSON.parse(localStorage.getItem('myStreamers')) || [];
            list.push({name, url});
            localStorage.setItem('myStreamers', JSON.stringify(list));
            renderList();
        }
    };

    document.getElementById('streamUrl').addEventListener('focus', function() {
      if (this.dataset.lastInput) this.value = this.dataset.lastInput;
    });

    window.onload = renderList;
  </script>
</body>
</html>
