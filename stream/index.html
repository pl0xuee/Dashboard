<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' https://unpkg.com; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://player.twitch.tv https://www.twitch.tv https://www.youtube.com https://tv.youtube.com https://clips.twitch.tv; media-src 'self' https:; worker-src 'self'; manifest-src 'self'; form-action 'self' https://search.brave.com" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Stream - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260630modern" />
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="stylesheet" href="./assets/stream-inline.css?v=20260630modern" />
</head>
<body class="stream-page">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
        <a href="../web-games/" class="home-button">Games</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" class="stream-url-input" placeholder="YouTube URL or Twitch Channel Name">
        <button id="loadStreamBtn" class="home-button">Load</button>
        <button id="toggleTheaterBtn" class="home-button">Theater Mode</button>
        <button id="toggleChatBtn" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div class="streamer-dropdown-title">My Streamers</div>
            <div class="streamer-dropdown-subtitle">Live Channels Only</div>
            <div id="youtubeScanStatus" class="youtube-scan-status"></div>
            <div id="listItems"></div>
            <div class="streamer-divider"></div>
            <a id="addStreamerBtn" href="#" class="streamer-action streamer-action-add">+ Add Streamer</a>
            <a id="twitchConnectBtn" href="#" class="streamer-action streamer-action-twitch">+ Connect Twitch</a>
            <a id="youtubeConnectBtn" href="#" class="streamer-action streamer-action-youtube">+ Connect YouTube</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <button id="streamTheaterExitBtn" type="button" class="home-button stream-theater-exit">Default View</button>
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../assets/js/script.js"></script>
  <script type="module" src="./assets/config-inline.js?v=20260630c"></script>

  <script src="./assets/stream-inline.js?v=20260630c"></script>
</body>
</html>
