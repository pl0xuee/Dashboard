<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream - Command Center</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    .page {
      max-width: 99% !important; /* Wider width for stream page */
    }

    .stream-container {
      display: flex;
      flex: 1;
      gap: 5px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      min-height: 0;
    }
    .stream-player {
      flex: 1;
      height: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stream-chat {
      flex: 0 0 390px;
      width: 390px;
      height: 100%;
      background: #0d1117;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    @media (max-width: 1200px) {
      .stream-chat {
        flex-basis: 340px;
        width: 340px;
      }
    }

    /* Removed the filter invert trick */
    .stream-chat iframe {
      filter: none;
    }
    /* Force Twitch/YouTube chat frames to look darker if possible via query params */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      /* padding: 10px; */ /* Removed */
      background: transparent; /* Removed background */
      border-radius: 20px;
      margin-bottom: 0; /* Adjusted */
    }

        /* Dropdown Styles */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: max-content;
      min-width: 180px;
      max-width: 240px;
      z-index: 20;
      padding: 6px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      right: 0;
      top: 100%;
      margin-top: 0px;
      max-height: 70vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .dropdown-content::-webkit-scrollbar { width: 4px; }
    .dropdown-content::-webkit-scrollbar-track { background: transparent; }
    .dropdown-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .dropdown:hover .dropdown-content { display: block; }

    .dropdown-content a {
      display: block;
      padding: 8px 12px;
      text-decoration: none;
      color: #e8ecef;
      border-radius: 8px;
      font-size: 13px;
    }

    .dropdown-content a:hover {
      background: rgba(109, 140, 255, 0.14);
      color: #f6f8ff;
    }
  </style>
</head>
<body class="stream-page">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" placeholder="YouTube URL or Twitch Channel Name" onkeydown="if(event.key === 'Enter') loadStream()" style="width: 350px; height: 38px; padding: 0 12px; margin: 0 4px;">
        <button onclick="loadStream()" class="home-button">Load</button>
        <button onclick="toggleChat()" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div style="padding:4px 6px 6px; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(200,210,255,0.45);">My Streamers</div>
            <div id="listItems"></div>
            <div style="border-top: 1px solid var(--border); margin: 6px 0 4px;"></div>
            <a id="twitchConnectBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#a970ff; text-decoration:none; border-radius:8px; transition:background 0.15s;" onmouseover="this.style.background='rgba(169,112,255,0.12)'" onmouseout="this.style.background='transparent'">+ Connect Twitch</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../script.js"></script>
  <script type="module">
    import { API_KEY, TWITCH_CLIENT_ID } from '../config.js';
    window.API_KEY = API_KEY;
    window.TWITCH_CLIENT_ID = TWITCH_CLIENT_ID;
    // Now that clientId is set, complete any pending OAuth callback
    if (window._twitchJustConnected) {
      fetchTwitchFollows();
    }
  </script>

  <script>
    window.loadStream = function() {
      const inputElement = document.getElementById('streamUrl');
      const input = inputElement.value.trim();
      const player = document.getElementById('player');
      const chat = document.getElementById('chat');
      
      if (!input) return;
      if (input.includes('youtube.com') || input.includes('youtu.be') || input.includes('@')) {
        let videoId = "";
        if (input.includes('v=')) {
          videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
          videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if (input.includes('/embed/')) {
          videoId = input.split('/embed/')[1].split('?')[0];
        } else if (input.includes('@')) {
            videoId = input.split('@').pop().split('/')[0];
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${videoId}&autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            chat.innerHTML = `<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1"></iframe>`;
            return;
        } else {
          videoId = input.split('/').pop();
        }

        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;

        const chatIframe = document.createElement('iframe');
        chatIframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1`;

        chatIframe.onload = function() {
          try {
            const body = chatIframe.contentDocument.body;
            if (body && body.innerText.includes('disabled')) {
              chat.style.display = 'none';
            } else {
                chat.style.display = 'block';
            }
          } catch(e) {
            chat.style.display = 'block';
    }
        };

        chat.innerHTML = '';
        chat.appendChild(chatIframe);

        inputElement.dataset.lastInput = videoId;
        inputElement.value = "You are Watching: " + videoId;
      } else {
        const channel = input.includes('twitch.tv/') ? input.split('twitch.tv/').pop().split('/')[0] : input;
        player.innerHTML = '<iframe src="https://player.twitch.tv/?channel=' + channel + '&parent=' + window.location.hostname + '&autoplay=true&muted=false" allow="autoplay; fullscreen" allowfullscreen></iframe>';
        chat.innerHTML = '<iframe src="https://www.twitch.tv/embed/' + channel + '/chat?parent=' + window.location.hostname + '&darkpopout"></iframe>';
        chat.style.display = 'block';
        inputElement.dataset.lastInput = channel;
        inputElement.value = "You are Watching: " + channel;
      }
    };

    window.toggleChat = function() {
      const chat = document.getElementById('chat');
      chat.style.display = (chat.style.display === 'none') ? 'block' : 'none';
    };

    window.loadStreamDirect = function(url) {
      document.getElementById('streamUrl').value = url;
      loadStream();
    };

    async function renderList() {
        const manual   = JSON.parse(localStorage.getItem('myStreamers'))   || [{name: 'hutchmf', url: 'hutchmf'}, {name: 'shroud', url: 'shroud'}];
        const followed = JSON.parse(localStorage.getItem('twitchFollowed')) || [];

        // Merge manual + followed, dedupe by lowercase url/login
        const seen = new Set();
        const combined = [];
        for (const item of [...manual, ...followed]) {
            const key = item.url.toLowerCase();
            if (!seen.has(key)) { seen.add(key); combined.push(item); }
        }

        // Batch status check via Helix if token available, else fall back to decapi
        const token    = localStorage.getItem('twitchToken');
        const clientId = window.TWITCH_CLIENT_ID;
        const onlineSet = new Set();

        if (token && clientId && clientId !== 'YOUR_TWITCH_CLIENT_ID') {
            const twitchItems = combined.filter(i => !i.url.includes('youtube'));
            for (let i = 0; i < twitchItems.length; i += 100) {
                const batch = twitchItems.slice(i, i + 100);
                const query = batch.map(b => `user_login=${encodeURIComponent(b.url)}`).join('&');
                try {
                    const resp = await fetch(`https://api.twitch.tv/helix/streams?${query}`, {
                        headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        data.data.forEach(s => onlineSet.add(s.user_login.toLowerCase()));
                    } else if (resp.status === 401) {
                        twitchLogout();
                    }
                } catch(e) {}
            }
        } else {
            const statuses = await Promise.all(combined.map(item => getTwitchStatus(item.url)));
            statuses.forEach((s, i) => { if (s) onlineSet.add(combined[i].url.toLowerCase()); });
        }

        const withStatus = combined.map(item => ({ ...item, isOnline: onlineSet.has(item.url.toLowerCase()) }));
        const liveOnly = withStatus.filter(item => item.isOnline);

        const container = document.getElementById('listItems');
        container.innerHTML = '';

        if (liveOnly.length === 0) {
          container.innerHTML = `<div style="padding:8px 10px; font-size:12px; color:rgba(200,210,255,0.4); text-align:center;">No one is live right now</div>`;
        } else {
          liveOnly.forEach((item) => {
            const isManual = manual.some(m => m.url.toLowerCase() === item.url.toLowerCase());
            const removeBtn = isManual
              ? `<button onclick="removeStreamer('${item.name}')" style="background:none; border:none; color:rgba(255,80,80,0.5); cursor:pointer; font-size:16px; margin-left:6px; padding:0 2px; flex-shrink:0; transition:all 0.2s;" onmouseover="this.style.color='rgba(255,80,80,1)'; this.style.transform='scale(1.2)';" onmouseout="this.style.color='rgba(255,80,80,0.5)'; this.style.transform='scale(1)';">×</button>`
              : '';
            container.innerHTML += `
              <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; margin-bottom:4px; background:rgba(0,200,80,0.18); border:1px solid rgba(0,200,80,0.45); border-radius:8px; transition:filter 0.15s;" onmouseover="this.style.filter='brightness(1.25)'" onmouseout="this.style.filter='brightness(1)'">
                <a href="#" onclick="loadStreamDirect('${item.url}')" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:#e8ecef; flex-grow:1; min-width:0;">
                  <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; font-weight:600; text-transform:capitalize; letter-spacing:0.02em;">${item.name}</span>
                </a>
                ${removeBtn}
              </div>`;
          });
        }

        updateConnectButton();
    }

    async function getTwitchStatus(url) {
        if (url.includes('youtube')) return false;
        const channel = url.includes('twitch.tv/') ? url.split('twitch.tv/').pop().split('/')[0] : url;
        try {
            const response = await fetch(`https://decapi.me/twitch/uptime/${channel}`);
            const text = await response.text();
            return !text.includes("offline") && !text.includes("not found");
        } catch (e) {
            return false;
        }
    }

    // --- Twitch OAuth ---
    function twitchLogin() {
        const clientId = window.TWITCH_CLIENT_ID;
        if (!clientId || clientId === 'YOUR_TWITCH_CLIENT_ID') {
            alert('Set your TWITCH_CLIENT_ID in config.js first.\n\nRegister a free app at: https://dev.twitch.tv/console/apps');
            return;
        }
        const redirect = window.location.origin + window.location.pathname;
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=user:read:follows`;
    }

    function twitchLogout() {
        localStorage.removeItem('twitchToken');
        localStorage.removeItem('twitchFollowed');
        renderList();
    }

    function updateConnectButton() {
        const btn = document.getElementById('twitchConnectBtn');
        if (!btn) return;
        const token = localStorage.getItem('twitchToken');
        if (token) {
            btn.textContent = 'Disconnect Twitch';
            btn.onclick = (e) => { e.preventDefault(); twitchLogout(); };
            btn.style.color = 'rgba(200,210,255,0.4)';
        } else {
            btn.textContent = '+ Connect Twitch';
            btn.onclick = (e) => { e.preventDefault(); twitchLogin(); };
            btn.style.color = '#a970ff';
        }
    }

    async function fetchTwitchFollows() {
        const token    = localStorage.getItem('twitchToken');
        const clientId = window.TWITCH_CLIENT_ID;
        if (!token || !clientId || clientId === 'YOUR_TWITCH_CLIENT_ID') return;
        try {
            const userResp = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
            });
            if (!userResp.ok) { twitchLogout(); return; }
            const userData = await userResp.json();
            const userId = userData.data[0].id;

            let follows = [], cursor = '';
            do {
                const url = `https://api.twitch.tv/helix/channels/followed?user_id=${userId}&first=100${cursor ? '&after=' + cursor : ''}`;
                const resp = await fetch(url, {
                    headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
                });
                if (!resp.ok) break;
                const data = await resp.json();
                follows = follows.concat(data.data);
                cursor = data.pagination?.cursor || '';
            } while (cursor);

            localStorage.setItem('twitchFollowed', JSON.stringify(
                follows.map(f => ({ name: f.broadcaster_name, url: f.broadcaster_login }))
            ));
            renderList();
        } catch (e) {
            console.error('Twitch follow fetch error', e);
        }
    }

    // Handle OAuth redirect — runs immediately, but defers fetch until module sets TWITCH_CLIENT_ID
    (function handleOAuthCallback() {
        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            const params = new URLSearchParams(hash.slice(1));
            const token = params.get('access_token');
            if (token) {
                localStorage.setItem('twitchToken', token);
                history.replaceState(null, '', window.location.pathname);
                window._twitchJustConnected = true; // module script will call fetchTwitchFollows()
            }
        }
    })();

    window.removeStreamer = function(name) {
        let list = JSON.parse(localStorage.getItem('myStreamers'));
        list = list.filter(item => item.name !== name);
        localStorage.setItem('myStreamers', JSON.stringify(list));
        renderList();
        event.stopPropagation();
    };

    document.getElementById('streamUrl').addEventListener('focus', function() {
      if (this.dataset.lastInput) this.value = this.dataset.lastInput;
    });

    window.onload = renderList;
  </script>
</body>
</html>
