<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://embed.twitch.tv https://player.twitch.tv https://static.twitchcdn.net; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://embed.twitch.tv https://player.twitch.tv https://www.twitch.tv https://www.youtube.com https://tv.youtube.com https://clips.twitch.tv; media-src 'self' https:; worker-src 'self'; manifest-src 'self'; form-action 'self'" />
  <meta name="theme-color" content="#0d1116" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Stream - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260722shell1" />
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="stylesheet" href="./assets/stream-inline.css?v=20260722shell1" />
</head>
<body class="site-page stream-page">
  <div class="page">
    <header class="page-header">
      <a href="../" class="brand" aria-label="Command Center home">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 5 28 27H4Z" fill="url(#brandGrad)"/><defs><linearGradient id="brandGrad" x1="4" y1="27" x2="28" y2="5"><stop offset="0" stop-color="#a9762a"/><stop offset="1" stop-color="#ffb000"/></linearGradient></defs></svg></span>
        <span class="brand-name">Command Center</span>
      </a>
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button" aria-current="page">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
        <a href="../web-games/" class="home-button">Games</a>
        <a href="../repos/" class="home-button">Repos</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" class="stream-url-input" aria-label="YouTube URL or Twitch channel name" placeholder="YouTube URL or Twitch Channel Name">
        <button id="loadStreamBtn" class="home-button">Load</button>
        <div class="stream-layout-group" role="group" aria-label="Number of streams">
          <span class="stream-layout-label">Streams</span>
          <button type="button" class="stream-layout-btn" data-count="1">1</button>
          <button type="button" class="stream-layout-btn" data-count="2">2</button>
          <button type="button" class="stream-layout-btn" data-count="3">3</button>
          <button type="button" class="stream-layout-btn" data-count="4">4</button>
        </div>
        <button id="toggleTheaterBtn" class="home-button">Theater Mode</button>
        <button id="toggleChatBtn" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content">
            <div class="streamer-dropdown-title">My Streamers</div>
            <div class="streamer-dropdown-subtitle">Live Channels Only</div>
            <div id="youtubeScanStatus" class="youtube-scan-status"></div>
            <div id="listItems"></div>
            <div class="streamer-divider"></div>
            <a id="addStreamerBtn" href="#" class="streamer-action streamer-action-add">+ Add Streamer</a>
            <a id="twitchConnectBtn" href="#" class="streamer-action streamer-action-twitch">+ Connect Twitch</a>
            <a id="youtubeConnectBtn" href="#" class="streamer-action streamer-action-youtube">+ Connect YouTube</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <h1 class="visually-hidden">Stream</h1>
      <div class="stream-container">
        <button id="streamTheaterExitBtn" type="button" class="home-button stream-theater-exit">Default View</button>
        <div class="stream-grid" id="streamGrid" data-count="1">
          <div class="stream-tile" id="streamTile0" data-slot="0">
            <div class="stream-tile-header">
              <span class="stream-tile-dot" aria-hidden="true"></span>
              <span class="stream-tile-label"></span>
              <button type="button" class="stream-tile-close" data-slot="0" title="Close stream">×</button>
            </div>
            <div class="stream-tile-body" id="streamTileBody0"></div>
            <div class="stream-tile-placeholder"><span class="stream-tile-placeholder-label">+ Add Stream</span></div>
          </div>
          <div class="stream-tile" id="streamTile1" data-slot="1">
            <div class="stream-tile-header">
              <span class="stream-tile-dot" aria-hidden="true"></span>
              <span class="stream-tile-label"></span>
              <button type="button" class="stream-tile-close" data-slot="1" title="Close stream">×</button>
            </div>
            <div class="stream-tile-body" id="streamTileBody1"></div>
            <div class="stream-tile-placeholder"><span class="stream-tile-placeholder-label">+ Add Stream</span></div>
          </div>
          <div class="stream-tile" id="streamTile2" data-slot="2">
            <div class="stream-tile-header">
              <span class="stream-tile-dot" aria-hidden="true"></span>
              <span class="stream-tile-label"></span>
              <button type="button" class="stream-tile-close" data-slot="2" title="Close stream">×</button>
            </div>
            <div class="stream-tile-body" id="streamTileBody2"></div>
            <div class="stream-tile-placeholder"><span class="stream-tile-placeholder-label">+ Add Stream</span></div>
          </div>
          <div class="stream-tile" id="streamTile3" data-slot="3">
            <div class="stream-tile-header">
              <span class="stream-tile-dot" aria-hidden="true"></span>
              <span class="stream-tile-label"></span>
              <button type="button" class="stream-tile-close" data-slot="3" title="Close stream">×</button>
            </div>
            <div class="stream-tile-body" id="streamTileBody3"></div>
            <div class="stream-tile-placeholder"><span class="stream-tile-placeholder-label">+ Add Stream</span></div>
          </div>
        </div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
    <footer class="site-footer">
      <a href="../" class="footer-plate" aria-label="Command Center home">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 5 28 27H4Z" fill="#a9762a"/></svg></span>
        <span class="footer-plate-text">
          <span class="footer-plate-name">Command Center</span>
          <span class="footer-plate-stamp">pl0xuee.com</span>
        </span>
      </a>
      <nav class="footer-nav" aria-label="Site information">
        <a href="../griddown/privacy/">GridDown privacy</a>
        <a href="https://github.com/pl0xuee/Dashboard" target="_blank">Source</a>
      </nav>
    </footer>
  </div>
  <script src="../assets/js/script.js"></script>
  <script type="module" src="./assets/config-inline.js?v=20260722shell1"></script>

  <script src="./assets/stream-inline.js?v=20260722shell1"></script>
</body>
</html>
