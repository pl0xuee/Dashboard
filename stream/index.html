<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' https://unpkg.com https://widgets.tradingview-widget.com https://s3.tradingview.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data: https:; connect-src 'self' https: http:; frame-src 'self' https://player.twitch.tv https://www.twitch.tv https://www.youtube.com https://tv.youtube.com https://clips.twitch.tv; media-src 'self' https: http:; worker-src 'self'; manifest-src 'self'; form-action 'self' https://search.brave.com" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Stream - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="./assets/stream-inline.css" />
</head>
<body class="stream-page">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
        <a href="../web-games/" class="home-button">Games</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" placeholder="YouTube URL or Twitch Channel Name" style="width: 350px; height: 38px; padding: 0 12px; margin: 0 4px;">
        <button id="loadStreamBtn" class="home-button">Load</button>
        <button id="toggleChatBtn" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div style="padding:4px 6px 2px; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(200,210,255,0.45);">My Streamers</div>
            <div style="padding:0 6px 6px; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(0,220,120,0.75);">Live Channels Only</div>
            <div id="youtubeScanStatus" style="padding:0 6px 6px; font-size:10px; color:rgba(255,180,140,0.75); min-height:14px;"></div>
            <div id="listItems"></div>
            <div style="border-top: 1px solid var(--border); margin: 6px 0 4px;"></div>
            <a id="addStreamerBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#7dd3fc; text-decoration:none; border-radius:8px; transition:background 0.15s;">+ Add Streamer</a>
            <a id="twitchConnectBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#a970ff; text-decoration:none; border-radius:8px; transition:background 0.15s;">+ Connect Twitch</a>
            <a id="youtubeConnectBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#ff6a4a; text-decoration:none; border-radius:8px; transition:background 0.15s;">+ Connect YouTube</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../script.js"></script>
  <script type="module" src="./assets/config-inline.js"></script>

  <script src="./assets/stream-inline.js"></script>
</body>
</html>
