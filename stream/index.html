<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream - Command Center</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    .page {
      max-width: 99% !important; /* Wider width for stream page */
    }

    .stream-container {
      display: flex;
      flex: 1;
      gap: 5px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      min-height: 0;
    }
    .stream-player {
      flex: 1;
      height: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stream-chat {
      flex: 0 0 390px;
      width: 390px;
      height: 100%;
      background: #0d1117;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    @media (max-width: 1200px) {
      .stream-chat {
        flex-basis: 340px;
        width: 340px;
      }
    }

    /* Removed the filter invert trick */
    .stream-chat iframe {
      filter: none;
    }
    /* Force Twitch/YouTube chat frames to look darker if possible via query params */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      /* padding: 10px; */ /* Removed */
      background: transparent; /* Removed background */
      border-radius: 20px;
      margin-bottom: 0; /* Adjusted */
    }

        /* Dropdown Styles */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: max-content;
      min-width: 180px;
      max-width: 240px;
      z-index: 20;
      padding: 6px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      right: 0;
      top: 100%;
      margin-top: 0px;
      max-height: 70vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .dropdown-content::-webkit-scrollbar { width: 4px; }
    .dropdown-content::-webkit-scrollbar-track { background: transparent; }
    .dropdown-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .dropdown:hover .dropdown-content { display: block; }

    .dropdown-content a {
      display: block;
      padding: 8px 12px;
      text-decoration: none;
      color: #e8ecef;
      border-radius: 8px;
      font-size: 13px;
    }

    .dropdown-content a:hover {
      background: rgba(109, 140, 255, 0.14);
      color: #f6f8ff;
    }
  </style>
</head>
<body class="stream-page">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" placeholder="YouTube URL or Twitch Channel Name" onkeydown="if(event.key === 'Enter') loadStream()" style="width: 350px; height: 38px; padding: 0 12px; margin: 0 4px;">
        <button onclick="loadStream()" class="home-button">Load</button>
        <button onclick="toggleChat()" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div style="padding:4px 6px 2px; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(200,210,255,0.45);">My Streamers</div>
            <div style="padding:0 6px 6px; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(0,220,120,0.75);">Live Channels Only</div>
            <div id="listItems"></div>
            <div style="border-top: 1px solid var(--border); margin: 6px 0 4px;"></div>
            <a id="twitchConnectBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#a970ff; text-decoration:none; border-radius:8px; transition:background 0.15s;" onmouseover="this.style.background='rgba(169,112,255,0.12)'" onmouseout="this.style.background='transparent'">+ Connect Twitch</a>
            <a id="youtubeConnectBtn" href="#" style="display:block; text-align:center; padding:6px 10px; font-size:12px; font-weight:600; color:#ff6a4a; text-decoration:none; border-radius:8px; transition:background 0.15s;" onmouseover="this.style.background='rgba(255,106,74,0.12)'" onmouseout="this.style.background='transparent'">+ Connect YouTube</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../script.js"></script>
  <script type="module">
    import { API_KEY, TWITCH_CLIENT_ID, YOUTUBE_CLIENT_ID } from '../config.js';
    window.API_KEY = API_KEY;
    window.TWITCH_CLIENT_ID = TWITCH_CLIENT_ID;
    window.YOUTUBE_CLIENT_ID = YOUTUBE_CLIENT_ID;
    // Now that clientId is set, complete any pending OAuth callback
    if (window._twitchJustConnected) {
      fetchTwitchFollows();
    }
    if (window._youtubeJustConnected) {
      fetchYouTubeSubscriptions();
    }
  </script>

  <script>
    const DROPDOWN_REFRESH_COOLDOWN_MS = 15000;
    const YOUTUBE_LIVE_CACHE_TTL_MS = 120000;
    const YOUTUBE_SUBS_CACHE_TTL_MS = 6 * 60 * 60 * 1000;
    const YOUTUBE_LIVE_SCAN_LIMIT = 60;
    let lastDropdownRefreshAt = 0;
    let dropdownRefreshInFlight = false;

    async function refreshListOnDropdownHover() {
      const now = Date.now();
      if (dropdownRefreshInFlight) return;
      if (now - lastDropdownRefreshAt < DROPDOWN_REFRESH_COOLDOWN_MS) return;

      dropdownRefreshInFlight = true;
      try {
        await renderList();
        lastDropdownRefreshAt = Date.now();
      } finally {
        dropdownRefreshInFlight = false;
      }
    }

    window.loadStream = function() {
      const inputElement = document.getElementById('streamUrl');
      const input = inputElement.value.trim();
      const player = document.getElementById('player');
      const chat = document.getElementById('chat');
      
      if (!input) return;
      if (input.includes('youtube.com') || input.includes('youtu.be') || input.includes('@')) {
        let videoId = "";
        if (input.includes('v=')) {
          videoId = input.split('v=')[1].split('&')[0];
        } else if (input.includes('youtu.be/')) {
          videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if (input.includes('/embed/')) {
          videoId = input.split('/embed/')[1].split('?')[0];
        } else if (input.includes('@')) {
            videoId = input.split('@').pop().split('/')[0];
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${videoId}&autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            chat.innerHTML = `<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1"></iframe>`;
            return;
        } else {
          videoId = input.split('/').pop();
        }

        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&origin=${window.location.origin}&enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;

        const chatIframe = document.createElement('iframe');
        chatIframe.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${window.location.hostname}&dark_theme=1`;

        chatIframe.onload = function() {
          try {
            const body = chatIframe.contentDocument.body;
            if (body && body.innerText.includes('disabled')) {
              chat.style.display = 'none';
            } else {
                chat.style.display = 'block';
            }
          } catch(e) {
            chat.style.display = 'block';
    }
        };

        chat.innerHTML = '';
        chat.appendChild(chatIframe);

        inputElement.dataset.lastInput = videoId;
        inputElement.value = "You are Watching: " + videoId;
      } else {
        const channel = input.includes('twitch.tv/') ? input.split('twitch.tv/').pop().split('/')[0] : input;
        player.innerHTML = '<iframe src="https://player.twitch.tv/?channel=' + channel + '&parent=' + window.location.hostname + '&autoplay=true&muted=false" allow="autoplay; fullscreen" allowfullscreen></iframe>';
        chat.innerHTML = '<iframe src="https://www.twitch.tv/embed/' + channel + '/chat?parent=' + window.location.hostname + '&darkpopout"></iframe>';
        chat.style.display = 'block';
        inputElement.dataset.lastInput = channel;
        inputElement.value = "You are Watching: " + channel;
      }
    };

    window.toggleChat = function() {
      const chat = document.getElementById('chat');
      chat.style.display = (chat.style.display === 'none') ? 'block' : 'none';
    };

    window.loadStreamDirect = function(url) {
      document.getElementById('streamUrl').value = url;
      loadStream();
    };

    function formatViewerCount(n) {
      if (!Number.isFinite(n) || n < 0) return '0';
      if (n >= 1000000) return `${(n / 1000000).toFixed(n >= 10000000 ? 0 : 1)}M`;
      if (n >= 1000) return `${(n / 1000).toFixed(n >= 100000 ? 0 : 1)}K`;
      return `${Math.round(n)}`;
    }

    function getOAuthRedirect() {
      return window.location.origin + window.location.pathname;
    }

    function makeOAuthState(provider) {
      const nonce = Math.random().toString(36).slice(2);
      return `${provider}-${Date.now()}-${nonce}`;
    }

    async function mapWithConcurrency(items, worker, limit = 8) {
      const results = [];
      let index = 0;

      async function runner() {
        while (index < items.length) {
          const currentIndex = index++;
          results[currentIndex] = await worker(items[currentIndex], currentIndex);
        }
      }

      const workers = Array.from({ length: Math.min(limit, items.length) }, () => runner());
      await Promise.all(workers);
      return results;
    }

    function getCachedJson(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || 'null');
      } catch (_) {
        return null;
      }
    }

    function setCachedJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    async function ytApi(path, token) {
      const resp = await fetch(`https://www.googleapis.com/youtube/v3/${path}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (resp.status === 401 || resp.status === 403) {
        youtubeLogout();
        throw new Error('YouTube auth expired');
      }
      if (!resp.ok) {
        throw new Error(`YouTube API error ${resp.status}`);
      }
      return await resp.json();
    }

    async function getYouTubeSubscriptions() {
      const token = localStorage.getItem('youtubeToken');
      if (!token) return [];

      const cached = getCachedJson('youtubeSubscriptionsCache');
      if (cached && Array.isArray(cached.items) && Date.now() - cached.updatedAt < YOUTUBE_SUBS_CACHE_TTL_MS) {
        return cached.items;
      }

      let items = [];
      let pageToken = '';
      do {
        const data = await ytApi(`subscriptions?part=snippet&mine=true&maxResults=50${pageToken ? `&pageToken=${encodeURIComponent(pageToken)}` : ''}`, token);
        const pageItems = (data.items || []).map(s => ({
          name: s.snippet?.title || 'YouTube Channel',
          channelId: s.snippet?.resourceId?.channelId || '',
          platform: 'youtube'
        })).filter(i => i.channelId);
        items = items.concat(pageItems);
        pageToken = data.nextPageToken || '';
      } while (pageToken);

      setCachedJson('youtubeSubscriptionsCache', { updatedAt: Date.now(), items });
      return items;
    }

    async function fetchYouTubeLiveStreams() {
      const token = localStorage.getItem('youtubeToken');
      if (!token) return [];

      const liveCache = getCachedJson('youtubeLiveCache');
      if (liveCache && Array.isArray(liveCache.items) && Date.now() - liveCache.updatedAt < YOUTUBE_LIVE_CACHE_TTL_MS) {
        return liveCache.items;
      }

      try {
        const subscriptions = await getYouTubeSubscriptions();
        const subset = subscriptions.slice(0, YOUTUBE_LIVE_SCAN_LIMIT);

        const searchResults = await mapWithConcurrency(subset, async (sub) => {
          try {
            const data = await ytApi(`search?part=snippet&channelId=${encodeURIComponent(sub.channelId)}&eventType=live&type=video&maxResults=1`, token);
            const item = data.items?.[0];
            if (!item?.id?.videoId) return null;
            return {
              name: item.snippet?.channelTitle || sub.name,
              url: `https://www.youtube.com/watch?v=${item.id.videoId}`,
              videoId: item.id.videoId,
              platform: 'youtube',
              isOnline: true,
              viewers: 0
            };
          } catch (_) {
            return null;
          }
        }, 8);

        const liveItems = searchResults.filter(Boolean);

        if (liveItems.length > 0) {
          const ids = liveItems.map(i => i.videoId);
          for (let i = 0; i < ids.length; i += 50) {
            const batch = ids.slice(i, i + 50).join(',');
            try {
              const data = await ytApi(`videos?part=liveStreamingDetails&id=${encodeURIComponent(batch)}`, token);
              const viewerMap = new Map((data.items || []).map(v => [v.id, Number(v.liveStreamingDetails?.concurrentViewers) || 0]));
              liveItems.forEach(item => {
                if (viewerMap.has(item.videoId)) item.viewers = viewerMap.get(item.videoId);
              });
            } catch (_) {}
          }
        }

        setCachedJson('youtubeLiveCache', { updatedAt: Date.now(), items: liveItems });
        return liveItems;
      } catch (e) {
        console.error('YouTube live fetch error', e);
        return [];
      }
    }

    async function renderList() {
        const manual   = JSON.parse(localStorage.getItem('myStreamers')) || [{name: 'hutchmf', url: 'hutchmf'}, {name: 'shroud', url: 'shroud'}];
        const followed = JSON.parse(localStorage.getItem('twitchFollowed')) || [];
        const youtubeLive = await fetchYouTubeLiveStreams();

        // Merge manual + followed, dedupe by lowercase url/login
        const seen = new Set();
        const combined = [];
        for (const item of [...manual, ...followed]) {
            const key = item.url.toLowerCase();
            if (!seen.has(key)) { seen.add(key); combined.push(item); }
        }

        // Batch status check via Helix if token available, else fall back to decapi
        const token    = localStorage.getItem('twitchToken');
        const clientId = window.TWITCH_CLIENT_ID;
        const onlineSet = new Set();
        const viewersByLogin = new Map();

        if (token && clientId && clientId !== 'YOUR_TWITCH_CLIENT_ID') {
            const twitchItems = combined.filter(i => !i.url.includes('youtube'));
            for (let i = 0; i < twitchItems.length; i += 100) {
                const batch = twitchItems.slice(i, i + 100);
                const query = batch.map(b => `user_login=${encodeURIComponent(b.url)}`).join('&');
                try {
                    const resp = await fetch(`https://api.twitch.tv/helix/streams?${query}`, {
                        headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                      data.data.forEach(s => {
                        const login = s.user_login.toLowerCase();
                        onlineSet.add(login);
                        viewersByLogin.set(login, Number(s.viewer_count) || 0);
                      });
                    } else if (resp.status === 401) {
                        twitchLogout();
                    }
                } catch(e) {}
            }
        } else {
            const statuses = await Promise.all(combined.map(item => getTwitchStatus(item.url)));
            statuses.forEach((s, i) => { if (s) onlineSet.add(combined[i].url.toLowerCase()); });
        }

        const withStatus = combined.map(item => {
          const login = item.url.toLowerCase();
          return {
            ...item,
            platform: 'twitch',
            isOnline: onlineSet.has(login),
            viewers: viewersByLogin.get(login) || 0
          };
        });
        const liveOnly = withStatus.filter(item => item.isOnline).concat(youtubeLive);

        const liveDedup = new Map();
        liveOnly.forEach(item => {
          const key = `${item.platform}:${item.url.toLowerCase()}`;
          if (!liveDedup.has(key)) liveDedup.set(key, item);
        });

        const liveRows = Array.from(liveDedup.values());
        liveRows.sort((a, b) => {
          if (b.viewers !== a.viewers) return b.viewers - a.viewers;
          return a.name.localeCompare(b.name);
        });

        const container = document.getElementById('listItems');
        container.innerHTML = '';

        if (liveRows.length === 0) {
          container.innerHTML = `<div style="padding:8px 10px; font-size:12px; color:rgba(200,210,255,0.4); text-align:center;">No one is live right now</div>`;
        } else {
          liveRows.forEach((item) => {
            const isManual = manual.some(m => m.url.toLowerCase() === item.url.toLowerCase());
            const viewersText = `(${formatViewerCount(item.viewers)})`;
            const platformBadge = item.platform === 'youtube'
              ? '<span style="font-size:10px; color:#ff6a4a; font-weight:700; letter-spacing:0.04em;">YT</span>'
              : '<span style="font-size:10px; color:#a970ff; font-weight:700; letter-spacing:0.04em;">TW</span>';
            const removeBtn = isManual
              ? `<button onclick="removeStreamer('${item.name}')" style="background:none; border:none; color:rgba(255,80,80,0.5); cursor:pointer; font-size:16px; margin-left:6px; padding:0 2px; flex-shrink:0; transition:all 0.2s;" onmouseover="this.style.color='rgba(255,80,80,1)'; this.style.transform='scale(1.2)';" onmouseout="this.style.color='rgba(255,80,80,0.5)'; this.style.transform='scale(1)';">×</button>`
              : '';
            container.innerHTML += `
              <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; margin-bottom:4px; background:rgba(0,200,80,0.18); border:1px solid rgba(0,200,80,0.45); border-radius:8px; transition:filter 0.15s;" onmouseover="this.style.filter='brightness(1.25)'" onmouseout="this.style.filter='brightness(1)'">
                <a href="#" onclick="loadStreamDirect('${item.url}')" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:#e8ecef; flex-grow:1; min-width:0;">
                  ${platformBadge}
                  <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; font-weight:600; text-transform:capitalize; letter-spacing:0.02em;">${item.name} <span style="font-size:11px; color:rgba(230,255,235,0.82);">${viewersText}</span></span>
                </a>
                ${removeBtn}
              </div>`;
          });
        }

        updateConnectButtons();
    }

    async function getTwitchStatus(url) {
        if (url.includes('youtube')) return false;
        const channel = url.includes('twitch.tv/') ? url.split('twitch.tv/').pop().split('/')[0] : url;
        try {
            const response = await fetch(`https://decapi.me/twitch/uptime/${channel}`);
            const text = await response.text();
            return !text.includes("offline") && !text.includes("not found");
        } catch (e) {
            return false;
        }
    }

    // --- Twitch OAuth ---
    function twitchLogin() {
        const clientId = window.TWITCH_CLIENT_ID;
        if (!clientId || clientId === 'YOUR_TWITCH_CLIENT_ID') {
            alert('Set your TWITCH_CLIENT_ID in config.js first.\n\nRegister a free app at: https://dev.twitch.tv/console/apps');
            return;
        }
      const state = makeOAuthState('tw');
      localStorage.setItem('twitchOAuthState', state);
      const redirect = getOAuthRedirect();
      window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=user:read:follows&state=${encodeURIComponent(state)}`;
    }

    function twitchLogout() {
        localStorage.removeItem('twitchToken');
        localStorage.removeItem('twitchFollowed');
        renderList();
    }

    function youtubeLogin() {
      const clientId = window.YOUTUBE_CLIENT_ID;
      if (!clientId || clientId === 'YOUR_YOUTUBE_CLIENT_ID') {
        alert('Set your YOUTUBE_CLIENT_ID in config.js first.\n\nCreate an OAuth client ID at: https://console.cloud.google.com/');
        return;
      }
      const state = makeOAuthState('yt');
      localStorage.setItem('youtubeOAuthState', state);
      const redirect = getOAuthRedirect();
      const scope = 'https://www.googleapis.com/auth/youtube.readonly';
      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(scope)}&include_granted_scopes=true&prompt=consent&state=${encodeURIComponent(state)}`;
    }

    function youtubeLogout() {
      localStorage.removeItem('youtubeToken');
      localStorage.removeItem('youtubeSubscriptionsCache');
      localStorage.removeItem('youtubeLiveCache');
      renderList();
    }

    function updateConnectButtons() {
      const twitchBtn = document.getElementById('twitchConnectBtn');
      const youtubeBtn = document.getElementById('youtubeConnectBtn');

      if (twitchBtn) {
        const twitchToken = localStorage.getItem('twitchToken');
        if (twitchToken) {
          twitchBtn.textContent = 'Disconnect Twitch';
          twitchBtn.onclick = (e) => { e.preventDefault(); twitchLogout(); };
          twitchBtn.style.color = 'rgba(200,210,255,0.4)';
        } else {
          twitchBtn.textContent = '+ Connect Twitch';
          twitchBtn.onclick = (e) => { e.preventDefault(); twitchLogin(); };
          twitchBtn.style.color = '#a970ff';
        }
      }

      if (youtubeBtn) {
        const youtubeToken = localStorage.getItem('youtubeToken');
        if (youtubeToken) {
          youtubeBtn.textContent = 'Disconnect YouTube';
          youtubeBtn.onclick = (e) => { e.preventDefault(); youtubeLogout(); };
          youtubeBtn.style.color = 'rgba(200,210,255,0.4)';
        } else {
          youtubeBtn.textContent = '+ Connect YouTube';
          youtubeBtn.onclick = (e) => { e.preventDefault(); youtubeLogin(); };
          youtubeBtn.style.color = '#ff6a4a';
        }
      }
    }

    async function fetchTwitchFollows() {
        const token    = localStorage.getItem('twitchToken');
        const clientId = window.TWITCH_CLIENT_ID;
        if (!token || !clientId || clientId === 'YOUR_TWITCH_CLIENT_ID') return;
        try {
            const userResp = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
            });
            if (!userResp.ok) { twitchLogout(); return; }
            const userData = await userResp.json();
            const userId = userData.data[0].id;

            let follows = [], cursor = '';
            do {
                const url = `https://api.twitch.tv/helix/channels/followed?user_id=${userId}&first=100${cursor ? '&after=' + cursor : ''}`;
                const resp = await fetch(url, {
                    headers: { 'Client-Id': clientId, 'Authorization': `Bearer ${token}` }
                });
                if (!resp.ok) break;
                const data = await resp.json();
                follows = follows.concat(data.data);
                cursor = data.pagination?.cursor || '';
            } while (cursor);

            localStorage.setItem('twitchFollowed', JSON.stringify(
                follows.map(f => ({ name: f.broadcaster_name, url: f.broadcaster_login }))
            ));
            renderList();
        } catch (e) {
            console.error('Twitch follow fetch error', e);
        }
    }

        async function fetchYouTubeSubscriptions() {
          const token = localStorage.getItem('youtubeToken');
          if (!token) return;
          try {
            await getYouTubeSubscriptions();
            // Force next live refresh to include YouTube after connect
            localStorage.removeItem('youtubeLiveCache');
            renderList();
          } catch (e) {
            console.error('YouTube subscriptions fetch error', e);
          }
        }

        // Handle OAuth redirect — runs immediately, but defers provider fetch until module sets client IDs
    (function handleOAuthCallback() {
        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            const params = new URLSearchParams(hash.slice(1));
            const token = params.get('access_token');
            const state = params.get('state') || '';
            if (token) {
              const twitchState = localStorage.getItem('twitchOAuthState') || '';
              const youtubeState = localStorage.getItem('youtubeOAuthState') || '';

              if ((state && twitchState && state === twitchState) || state.startsWith('tw-')) {
                localStorage.setItem('twitchToken', token);
                window._twitchJustConnected = true;
                localStorage.removeItem('twitchOAuthState');
              } else if ((state && youtubeState && state === youtubeState) || state.startsWith('yt-')) {
                localStorage.setItem('youtubeToken', token);
                window._youtubeJustConnected = true;
                localStorage.removeItem('youtubeOAuthState');
              }

                history.replaceState(null, '', window.location.pathname);
            }
        }
    })();

    window.removeStreamer = function(name) {
        let list = JSON.parse(localStorage.getItem('myStreamers'));
        list = list.filter(item => item.name !== name);
        localStorage.setItem('myStreamers', JSON.stringify(list));
        renderList();
        event.stopPropagation();
    };

    document.getElementById('streamUrl').addEventListener('focus', function() {
      if (this.dataset.lastInput) this.value = this.dataset.lastInput;
    });

    const streamerDropdown = document.querySelector('.dropdown');
    if (streamerDropdown) {
      streamerDropdown.addEventListener('mouseenter', refreshListOnDropdownHover);
    }

    window.onload = async function() {
      await renderList();
      lastDropdownRefreshAt = Date.now();
    };
  </script>
</body>
</html>
