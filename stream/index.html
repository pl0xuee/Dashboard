<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' https://unpkg.com https://embed.twitch.tv https://player.twitch.tv https://static.twitchcdn.net; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://embed.twitch.tv https://player.twitch.tv https://www.twitch.tv https://www.youtube.com https://tv.youtube.com https://clips.twitch.tv; media-src 'self' https:; worker-src 'self'; manifest-src 'self'; form-action 'self' https://search.brave.com" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Stream - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260708jellyfinconfig1" />

  <link rel="stylesheet" href="./assets/stream-inline.css?v=20260706theaterexit1" />
</head>
<body class="stream-page modern-v3">
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <a href="../" class="home-button"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V20h14V9.5"></path></svg></span><span class="nav-text">Home</span></a>
        <a href="../dashboard/" class="home-button"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"></rect><rect x="13" y="3" width="8" height="5" rx="1.5"></rect><rect x="13" y="10" width="8" height="11" rx="1.5"></rect><rect x="3" y="13" width="8" height="8" rx="1.5"></rect></svg></span><span class="nav-text">Dashboard</span></a>
        <a href="../stream/" class="home-button" aria-current="page"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="m10 9 6 3-6 3z"></path></svg></span><span class="nav-text">Stream</span></a>
        <a href="../media-portal/" class="home-button"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"></rect><path d="M8 20h8"></path><path d="M12 17v3"></path></svg></span><span class="nav-text">Media</span></a>
        <a href="../web-games/" class="home-button"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 10h10a4 4 0 0 1 4 4v1a3 3 0 0 1-3 3h-2l-2-2h-4l-2 2H6a3 3 0 0 1-3-3v-1a4 4 0 0 1 4-4Z"></path><path d="M8 13h2"></path><path d="M9 12v2"></path><circle cx="16.5" cy="13.5" r="1"></circle><circle cx="18.5" cy="15.5" r="1"></circle></svg></span><span class="nav-text">Games</span></a>
      </div>

      <!-- Controls moved back to the header on the right -->
      <div class="controls">
        <input type="text" id="streamUrl" class="stream-url-input" placeholder="YouTube URL or Twitch Channel Name">
        <button id="loadStreamBtn" class="home-button">Load</button>
        <button id="toggleTheaterBtn" class="home-button">Theater Mode</button>
        <button id="toggleChatBtn" class="home-button">Toggle Chat</button>
        <!-- Streamer Dropdown -->
        <div class="dropdown">
          <button class="dropbtn home-button">My Streamers ▼</button>
          <div class="dropdown-content" id="streamerList">
            <div class="streamer-dropdown-title">My Streamers</div>
            <div class="streamer-dropdown-subtitle">Live Channels Only</div>
            <div id="youtubeScanStatus" class="youtube-scan-status"></div>
            <div id="listItems"></div>
            <div class="streamer-divider"></div>
            <a id="addStreamerBtn" href="#" class="streamer-action streamer-action-add">+ Add Streamer</a>
            <a id="twitchConnectBtn" href="#" class="streamer-action streamer-action-twitch">+ Connect Twitch</a>
            <a id="youtubeConnectBtn" href="#" class="streamer-action streamer-action-youtube">+ Connect YouTube</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="stream-container">
        <button id="streamTheaterExitBtn" type="button" class="home-button stream-theater-exit">Default View</button>
        <div class="stream-player" id="player"></div>
        <div class="stream-chat" id="chat"></div>
      </div>
    </main>
  </div>
  <script src="../assets/js/script.js"></script>
  <script type="module" src="./assets/config-inline.js?v=20260630c"></script>

  <script src="./assets/stream-inline.js?v=20260706theaterexit1"></script>
</body>
</html>
