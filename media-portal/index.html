<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Server - Command Center</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
</head>
<body class="home-page">
  <div class="page">
    <header>
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>
    </header>
    <main class="main welcome">
      <div class="welcome-inner">
        <h1 style="margin-bottom: 10px;">Jellyfin Media Portal</h1>
        <p style="margin-bottom: 40px; color: var(--text-muted);">Access your private media library directly from your home network.</p>

        <a href="http://192.168.1.212:8096" target="_blank"
           class="home-button"
            style="display: flex; justify-content: center; align-items: center; width: fit-content; margin: 0 auto; text-align: center;">
           Click to Open Jellyfin
        </a>

        <div style="margin-top: 20px; padding: 15px 25px; border-radius: 20px; background: rgba(22, 28, 36, 0.4); border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 15px;">
            <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">Status</h3>
            <p id="server-status" style="font-size: 0.9rem; margin: 0; font-weight: 600; display: flex; align-items: center; gap: 6px;">Checking...</p>
        </div>
      </div>
    </main>
  </div>
  <script>
    async function checkServerStatus() {
        const statusEl = document.getElementById('server-status');
        try {
            // We use 'no-cache' to ensure we get the latest status
            // Note: This relies on the server supporting CORS, which Jellyfin might block.
            // If it shows "Offline" even when online, it's a browser security restriction.
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 5000);

            const response = await fetch('http://192.168.1.212:8096/web/index.html', { mode: 'no-cors', signal: controller.signal });
            statusEl.innerHTML = '<span style="color: #00ff00;">●</span> Online';
        } catch (e) {
            statusEl.innerHTML = '<span style="color: #ff3333;">●</span> Offline';
        }
    }
    checkServerStatus();
  </script>
</body>
</html>
