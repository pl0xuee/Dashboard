<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Media Server - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
</head>
<body class="home-page">
  <div class="page">
    <header>
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>
    </header>
    <main class="main welcome">
      <div class="welcome-inner">
        <h1 style="margin-bottom: 10px;">Jellyfin Media Portal</h1>
        <p style="margin-bottom: 40px; color: var(--text-muted);">Access your private media library directly from your home network.</p>

        <a href="http://192.168.1.212:8096" target="_blank"
           class="home-button"
            style="padding: 24px 48px; font-size: 1.5rem; background: #5a2c94; border-color: #7a3dbf; color: #fff; box-shadow: 0 4px 15px rgba(90, 44, 148, 0.4); display: flex; justify-content: center; align-items: center; width: fit-content; margin: 0 auto; text-align: center;">
           Click to Open Jellyfin
        </a>

        <div style="margin-top: 20px; padding: 15px 25px; border-radius: 20px; background: rgba(22, 28, 36, 0.4); border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 15px;">
            <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">Status</h3>
            <p id="server-status" style="font-size: 0.9rem; margin: 0; font-weight: 600; display: flex; align-items: center; gap: 6px;">Checking...</p>
        </div>

      </div>
    </main>
  </div>
  <script>
    async function checkServerStatus() {
        const statusEl = document.getElementById('server-status');
      const probeUrl = 'http://192.168.1.212:8096/web/favicon.ico';

      await new Promise((resolve) => {
        const image = new Image();
        const timeoutId = setTimeout(() => {
          image.onload = null;
          image.onerror = null;
          resolve(false);
        }, 5000);

        image.onload = () => {
          clearTimeout(timeoutId);
          resolve(true);
        };

        image.onerror = () => {
          clearTimeout(timeoutId);
          resolve(false);
        };

        image.src = `${probeUrl}?t=${Date.now()}`;
      }).then((isOnline) => {
        statusEl.innerHTML = isOnline
          ? '<span style="color: #00ff00;">●</span> Online'
          : '<span style="color: #ff3333;">●</span> Offline';
      });
    }
    checkServerStatus();
  </script>
</body>
</html>
