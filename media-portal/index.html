<body class="home-page media-page modern-v3">
  <div class="page">
    <header>
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button" aria-current="page">Media</a>
        <a href="../web-games/" class="home-button">Games</a>
      </div>
    </header>
    <main class="main welcome">
      <div class="welcome-inner">
        <h1 class="media-title">Jellyfin Media Portal</h1>
        <p class="media-subtitle">Access your private media library directly from your home network.</p>

          <a id="jellyfin-launch-btn" href="http://192.168.1.212:8096" target="_blank" rel="noopener noreferrer" class="home-button media-launch-btn">
           Click to Open Jellyfin
        </a>

        <div class="media-status-wrap">
            <h3 class="media-status-title">Status</h3>
            <p id="server-status" class="media-status-value">Checking...</p>
        </div>

        <div class="media-config-wrap">
          <label for="jellyfin-url-input" class="media-config-label">Jellyfin Server URL</label>
          <div class="media-config-row">
            <input id="jellyfin-url-input" class="media-config-input" type="url" placeholder="http://192.168.1.212:8096" autocomplete="url" spellcheck="false" />
            <button id="jellyfin-save-btn" class="home-button media-config-save-btn">Save</button>
          </div>
          <p id="jellyfin-save-msg" class="media-config-msg" aria-live="polite"></p>
        </div>

      </div>
    </main>
  </div>
