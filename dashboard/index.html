<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Dashboard - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <!-- Include the library for the charts -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="../script.js"></script>
  <script src="../dashboard-widgets.js?v=20260625u"></script>
</head>
<body class="home-page">
  <div class="page">
    <header class="dashboard-header">
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
      </div>
      <!-- Stock Ticker Container -->
      <div class="ticker-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols="AAPL,MSFT,NVDA,AMZN,GOOGL,META,BRK.B,TSLA,AVGO,LLY,JPM,V,JNJ,WMT,UNH,XOM,MA,PG,HD,CVX,BTCUSD,ETHUSD,BNBUSDT,SOLUSD,XRPUSDT,ADAUSDT,DOGEUSDT,AVAXUSDT,DOTUSDT,TRXUSDT,LINKUSDT,BCHUSDT,MATICUSDT,NEARUSDT,LTCUSDT,SHIBUSDT,DAIUSDT,ATOMUSDT,UNIUSDT,XLMUSDT" theme="dark" display-mode="compact" show-symbol-logo="false"></tv-ticker-tape>
      </div>
    </header>
    <main class="main">
      <div class="tradingview-grid" id="tradingviewGrid">
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker0" type="text" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="0" title="Search YouTube/Twitch">🔍</button>
            <button type="button" data-panel="0">Update</button>
          </div>
          <div class="tv-widget" id="tvWidget0"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker1" type="text" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="1" title="Search YouTube/Twitch">🔍</button>
            <button type="button" data-panel="1">Update</button>
          </div>
          <div class="tv-widget" id="tvWidget1"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker2" type="text" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="2" title="Search YouTube/Twitch">🔍</button>
            <button type="button" data-panel="2">Update</button>
          </div>
          <div class="tv-widget" id="tvWidget2"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker3" type="text" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="3" title="Search YouTube/Twitch">🔍</button>
            <button type="button" data-panel="3">Update</button>
          </div>
          <div class="tv-widget" id="tvWidget3"></div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
