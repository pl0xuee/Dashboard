<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://s3.tradingview.com https://widgets.tradingview-widget.com; style-src 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://s3.tradingview.com https://s.tradingview.com https://www.tradingview.com https://widgets.tradingview-widget.com https://www.tradingview-widget.com https://tradingview-widget.com https://player.twitch.tv https://www.youtube.com https://tv.youtube.com; media-src 'self'; worker-src 'self'; manifest-src 'self'; form-action 'self'" />
  <meta name="theme-color" content="#0d1116" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Dashboard - Command Center</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260722shell1" />
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <!-- The charting library is shipped with the site. Loading it from unpkg meant
       the one page that is nothing but charts went blank whenever a CDN we do not
       control was unreachable, and the service worker could not precache it. -->
  <script defer src="./assets/vendor/lightweight-charts.standalone.production.js?v=5.0.9"></script>
  <script defer src="../assets/js/script.js"></script>
  <script defer src="./assets/dashboard-widgets.js?v=20260723share1"></script>
</head>
<body class="site-page dashboard-page">
  <div class="page">
    <header class="dashboard-header">
      <a href="../" class="brand" aria-label="Command Center home">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 5 28 27H4Z" fill="url(#brandGrad)"/><defs><linearGradient id="brandGrad" x1="4" y1="27" x2="28" y2="5"><stop offset="0" stop-color="#a9762a"/><stop offset="1" stop-color="#ffb000"/></linearGradient></defs></svg></span>
        <span class="brand-name">Command Center</span>
      </a>
      <div class="header-left">
        <a href="../" class="home-button">Home</a>
        <a href="../dashboard/" class="home-button" aria-current="page">Dashboard</a>
        <a href="../stream/" class="home-button">Stream</a>
        <a href="../media-portal/" class="home-button">Media</a>
        <a href="../web-games/" class="home-button">Games</a>
        <a href="../repos/" class="home-button">Repos</a>
      </div>
    </header>
    <!-- The tape reads across the full width rather than sharing the header bezel.
         Inside the header it forced this one page's header to 88px against 58px
         everywhere else, and at tablet width it was crushed to a sliver clipped
         mid-price. -->
    <div class="ticker-strip">
      <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
      <tv-ticker-tape symbols="AAPL,MSFT,NVDA,AMZN,GOOGL,META,BRK.B,TSLA,AVGO,LLY,JPM,V,JNJ,WMT,UNH,XOM,MA,PG,HD,CVX,BTCUSD,ETHUSD,BNBUSDT,SOLUSD,XRPUSDT,ADAUSDT,DOGEUSDT,AVAXUSDT,DOTUSDT,TRXUSDT,LINKUSDT,BCHUSDT,MATICUSDT,NEARUSDT,LTCUSDT,SHIBUSDT,DAIUSDT,ATOMUSDT,UNIUSDT,XLMUSDT" theme="dark" display-mode="compact" show-symbol-logo="false"></tv-ticker-tape>
    </div>
    <main class="main">
      <h1 class="visually-hidden">Dashboard</h1>
      <div class="tradingview-grid" id="tradingviewGrid">
        <button id="dashboardTheaterExitBtn" type="button" class="home-button dashboard-theater-exit">Default View</button>
        <div id="dashboardTheaterMenu" class="dashboard-theater-menu" hidden>
          <button type="button" data-scope="panel" class="dashboard-theater-menu-btn">This Chart Only</button>
          <button type="button" data-scope="all" class="dashboard-theater-menu-btn">All 4 Charts</button>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker0" type="text" class="tv-ticker-input" aria-label="Chart 1 ticker symbol or YouTube/Twitch URL" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="0" data-action="theater" class="dashboard-theater-toggle-btn">Theater Mode</button>
            <button type="button" id="tvTickerSelect0" class="ticker-select-trigger" data-panel="0" data-action="ticker-menu" aria-haspopup="listbox" aria-expanded="false">Select ticker</button>
            <button type="button" data-panel="0" data-action="add-ticker" class="ticker-add-btn">Add Ticker</button>
          </div>
          <div class="tv-widget" id="tvWidget0"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker1" type="text" class="tv-ticker-input" aria-label="Chart 2 ticker symbol or YouTube/Twitch URL" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="1" data-action="theater" class="dashboard-theater-toggle-btn">Theater Mode</button>
            <button type="button" id="tvTickerSelect1" class="ticker-select-trigger" data-panel="1" data-action="ticker-menu" aria-haspopup="listbox" aria-expanded="false">Select ticker</button>
            <button type="button" data-panel="1" data-action="add-ticker" class="ticker-add-btn">Add Ticker</button>
          </div>
          <div class="tv-widget" id="tvWidget1"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker2" type="text" class="tv-ticker-input" aria-label="Chart 3 ticker symbol or YouTube/Twitch URL" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="2" data-action="theater" class="dashboard-theater-toggle-btn">Theater Mode</button>
            <button type="button" id="tvTickerSelect2" class="ticker-select-trigger" data-panel="2" data-action="ticker-menu" aria-haspopup="listbox" aria-expanded="false">Select ticker</button>
            <button type="button" data-panel="2" data-action="add-ticker" class="ticker-add-btn">Add Ticker</button>
          </div>
          <div class="tv-widget" id="tvWidget2"></div>
        </div>
        <div class="tv-panel">
          <div class="tv-panel-header">
            <input id="tvTicker3" type="text" class="tv-ticker-input" aria-label="Chart 4 ticker symbol or YouTube/Twitch URL" placeholder="Ticker symbol or YouTube/Twitch URL" value="" />
            <button type="button" data-panel="3" data-action="theater" class="dashboard-theater-toggle-btn">Theater Mode</button>
            <button type="button" id="tvTickerSelect3" class="ticker-select-trigger" data-panel="3" data-action="ticker-menu" aria-haspopup="listbox" aria-expanded="false">Select ticker</button>
            <button type="button" data-panel="3" data-action="add-ticker" class="ticker-add-btn">Add Ticker</button>
          </div>
          <div class="tv-widget" id="tvWidget3"></div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <a href="../" class="footer-plate" aria-label="Command Center home">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 5 28 27H4Z" fill="#a9762a"/></svg></span>
        <span class="footer-plate-text">
          <span class="footer-plate-name">Command Center</span>
          <span class="footer-plate-stamp">pl0xuee.com</span>
        </span>
      </a>
      <nav class="footer-nav" aria-label="Site information">
        <a href="../griddown/privacy/">GridDown privacy</a>
        <a href="https://github.com/pl0xuee/Dashboard" target="_blank">Source</a>
      </nav>
    </footer>
  </div>
</body>
</html>
